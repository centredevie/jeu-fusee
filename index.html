<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montée en Puissance</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body {
            background: #090d16;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            box-shadow: 0 0 40px rgba(0,0,0,0.85);
            background: #1e293b;
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* HUD Maquette */
        #ui-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; padding: 15px; z-index: 5; }
        .hud-box { 
            position: absolute; 
            background: rgba(14, 23, 41, 0.85); 
            padding: 10px 14px; 
            border-radius: 6px; 
            border: 2px solid #38bdf8; 
            font-weight: bold; 
            font-size: 15px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        #score-box { top: 15px; left: 15px; }
        #speed-box { top: 62px; left: 15px; }
        
        /* Super Jauge */
        #jauge-container { 
            position: absolute; 
            right: 15px; 
            top: 100px; 
            width: 28px; 
            height: 280px; 
            background: rgba(14, 23, 41, 0.85); 
            border: 2px solid #f59e0b; 
            border-radius: 14px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column-reverse;
        }
        #jauge-fill { 
            width: 100%; 
            height: 0%; 
            background: linear-gradient(to top, #fbbf24, #f97316, #ef4444); 
            transition: height 0.1s linear; 
        }
        #jauge-label { 
            position: absolute; 
            right: -52px; 
            top: 225px; 
            transform: rotate(-90deg); 
            font-size: 9px; 
            font-weight: bold; 
            letter-spacing: 1.2px; 
            text-transform: uppercase; 
            color: #fbbf24; 
        }

        /* Game Over */
        #game-over-screen { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(8, 12, 24, 0.98); 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            pointer-events: auto; 
            padding: 25px; 
            text-align: center; 
            z-index: 10; 
        }
        .btn { 
            background: #2563eb; 
            color: white; 
            border: none; 
            padding: 14px 28px; 
            font-size: 17px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 20px;
        }
        .leaderboard { width: 100%; max-width: 320px; margin: 20px 0; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; }
        .leaderboard-row { display: flex; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 15px; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="score-box" class="hud-box">PUISSANCE: <span id="scoreText">0</span> ⚡</div>
            <div id="speed-box" class="hud-box">VITESSE: <span id="speedText">1.0x</span></div>
            <div id="jauge-container"><div id="jauge-fill"></div><div id="jauge-label">Montée en puissance</div></div>
        </div>

        <div id="game-over-screen">
            <h1 style="color: #ef4444; margin-bottom: 5px; font-size: 26px;">FIN DE TRANSMISSION</h1>
            <p id="final-score-text" style="font-size: 20px; color: #fbbf24; margin-top: 5px; font-weight: bold;">Votre score : 0</p>
            <h3 style="margin-bottom: 8px;">🏆 TOP 5 DU WEEK-END</h3>
            <div class="leaderboard" id="leaderboard-content">
                <div class="leaderboard-row"><span>Chargement du classement...</span></div>
            </div>
            <button class="btn" onclick="recommencer()">RECOLLER AU DÉCOLLAGE</button>
        </div>
    </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-14uN1svuWyiSZN3yDsLpXKxaJKCsuRNZAvlvGCAoSjp_7fFjROydAhcinzHJgw3M/exec"; 

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 450;
canvas.height = 800;

// Variables de jeu
let score = 0; let gameSpeed = 4.5; let gameOver = false; let scrollY = 0;
let superJauge = 0; let estInvincible = false;
let screenShake = 0;

// Alignement parfait et élancé de la fusée (Hauteur respectée)
const rocket = { x: 195, y: 600, width: 60, height: 120, targetX: 195 };
let items = [];
let particules = [];
let topScoresLocaux = [];

// Génération procédurale des éléments du décor Minecraft (Arbres, Montagnes, Rivières)
let blocsDecor = [];
for (let i = 0; i < 30; i++) {
    blocsDecor.push({
        x: Math.floor(Math.random() * 15) * 30,
        y: Math.random() * canvas.height,
        w: 30 + Math.random() * 60,
        h: 40 + Math.random() * 80,
        couleur: Math.random() < 0.15 ? '#2563eb' : (Math.random() < 0.4 ? '#15803d' : '#16a34a') // Eau, Herbe foncée, Herbe claire
    });
}

prechargerScores();
spawnItem();
gameLoop();

function prechargerScores() {
    fetch(SCRIPT_URL).then(res => res.json()).then(data => { if(data) topScoresLocaux = data; }).catch(() => {});
}

function spawnItem() {
    if (gameOver) return;
    let rand = Math.random();
    let type = rand > 0.7 ? "booster" : (rand > 0.45 ? "nuage" : "obstacle");
    let size = type === "nuage" ? 90 : 45;

    items.push({
        x: Math.random() * (canvas.width - size - 40) + 20,
        y: -100,
        width: size,
        height: type === "nuage" ? 45 : 45,
        type: type
    });
    setTimeout(spawnItem, Math.max(320, 1200 - (gameSpeed * 40)));
}

function ajouterParticule(x, y, couleur, taille, vy) {
    particules.push({ x: x, y: y, vx: (Math.random() - 0.5) * 2, vy: vy, alpha: 1, taille: taille, couleur: couleur });
}

function update() {
    if (gameOver) return;

    // Défilement du décor de blocs
    scrollY += gameSpeed * 0.5;
    if (screenShake > 0) screenShake -= 0.1;

    gameSpeed += 0.002;
    document.getElementById("speedText").innerText = (gameSpeed / 4).toFixed(1) + "x";

    // --- SÉCURITÉ ANTI-TRICHE STRICTE ---
    rocket.x += (rocket.targetX - rocket.x) * 0.25;
    if (rocket.x < 20) rocket.x = 20;
    if (rocket.x > canvas.width - rocket.width - 20) rocket.x = canvas.width - rocket.width - 20;

    // Flammes de propulsion de la fusée
    if (Math.random() < 0.7) {
        ajouterParticule(rocket.x + rocket.width/2, rocket.y + rocket.height, '#f97316', Math.random()*5+3, Math.random()*2+4);
        if (estInvincible) ajouterParticule(rocket.x + rocket.width/2, rocket.y + rocket.height, '#38bdf8', Math.random()*6+4, Math.random()*2+5);
    }

    if (estInvincible) {
        superJauge -= 0.4;
        if (superJauge <= 0) estInvincible = false;
    }
    document.getElementById("jauge-fill").style.height = superJauge + "%";

    // Particules
    for (let p = particules.length - 1; p >= 0; p--) {
        particules[p].x += particules[p].vx;
        particules[p].y += particules[p].vy;
        particules[p].alpha -= 0.02;
        if (particules[p].alpha <= 0) particules.splice(p, 1);
    }

    // Objets
    for (let i = items.length - 1; i >= 0; i--) {
        let it = items[i];
        it.y += it.type === "nuage" ? gameSpeed * 0.7 : gameSpeed;

        if (it.type === "nuage") {
            if (it.y > canvas.height) items.splice(i, 1);
            continue;
        }

        // Collision précise
        if (rocket.x < it.x + it.width && rocket.x + rocket.width > it.x &&
            rocket.y < it.y + it.height && rocket.y + rocket.height > it.y) {
            
            if (it.type === "booster") {
                score += 30;
                for(let k=0; k<10; k++) ajouterParticule(it.x + 20, it.y + 20, '#38bdf8', Math.random()*4+2, (Math.random()-0.5)*4);
                if (!estInvincible) {
                    superJauge = Math.min(100, superJauge + 20);
                    if (superJauge >= 100) { estInvincible = true; screenShake = 3; }
                }
                items.splice(i, 1);
            } else {
                if (!estInvincible) {
                    screenShake = 6;
                    declencherGameOver();
                } else {
                    score += 60;
                    screenShake = 2;
                    for(let k=0; k<10; k++) ajouterParticule(it.x + 20, it.y + 20, '#ef4444', Math.random()*4+2, (Math.random()-0.5)*4);
                    items.splice(i, 1);
                }
            }
            document.getElementById("scoreText").innerText = score;
            continue;
        }

        if (it.y > canvas.height) { items.splice(i, 1); score += 2; document.getElementById("scoreText").innerText = score; }
    }
}

// DESSIN DES GRAPHISMES EN PUR CODE (ZÉRO IMAGE MANQUANTE POSSIBLE)
function draw() {
    ctx.save();
    if (screenShake > 0) ctx.translate((Math.random()-0.5)*screenShake*4, (Math.random()-0.5)*screenShake*4);

    // 1. Dessin du fond style Minecraft (Plaines, rivières défilantes)
    ctx.fillStyle = '#4ade80'; ctx.fillRect(0, 0, canvas.width, canvas.height); // Fond herbe verte
    
    blocsDecor.forEach(b => {
        let yDefile = (b.y + scrollY) % canvas.height;
        ctx.fillStyle = b.couleur;
        ctx.fillRect(b.x, yDefile, b.w, b.h);
        // Ombres des blocs style voxel
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fillRect(b.x, yDefile + b.h - 8, b.w, 8);
    });

    // 2. Traînées de feu
    particules.forEach(p => {
        ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.couleur;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.taille, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    });

    // 3. Dessin des obstacles & bonus en Pixel-Art mathématique
    items.forEach(it => {
        if (it.type === "obstacle") {
            // Météorite Voxel Grise
            ctx.fillStyle = '#64748b'; ctx.fillRect(it.x, it.y, it.width, it.height);
            ctx.fillStyle = '#475569'; ctx.fillRect(it.x + 5, it.y + 5, it.width - 10, it.height - 10);
            ctx.fillStyle = '#334155'; ctx.fillRect(it.x + 8, it.y + 20, 10, 10); // Cratère
        } else if (it.type === "booster") {
            // Batterie Lumineuse Orange/Jaune
            ctx.fillStyle = '#f97316'; ctx.fillRect(it.x, it.y, it.width, it.height);
            ctx.fillStyle = '#facc15'; ctx.fillRect(it.x + 6, it.y + 4, it.width - 12, it.height - 8);
            ctx.fillStyle = '#ffffff'; ctx.fillRect(it.x + 15, it.y + 12, 12, 18); // Éclair blanc
        } else if (it.type === "nuage") {
            // Nuages Minecraft blancs empilés
            ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.fillRect(it.x, it.y + 10, it.width, 25);
            ctx.fillRect(it.x + 15, it.y, it.width - 30, 20);
        }
    });

    // 4. DESSIN DE LA FUSÉE ÉLANCÉE EN PIXEL-ART (Parfaitement proportionnée)
    ctx.save();
    if (estInvincible) { ctx.shadowBlur = 20; ctx.shadowColor = '#fbbf24'; }
    
    // Corps principal blanc élancé
    ctx.fillStyle = '#f8fafc'; ctx.fillRect(rocket.x + 15, rocket.y + 20, 30, 80);
    // Nez rouge pointu
    ctx.fillStyle = '#ef4444';
    ctx.beginPath(); ctx.moveTo(rocket.x + 15, rocket.y + 20); ctx.lineTo(rocket.x + 30, rocket.y); ctx.lineTo(rocket.x + 45, rocket.y + 20); ctx.fill();
    // Ailerons latéraux rouges
    ctx.fillRect(rocket.x, rocket.y + 75, 15, 30);
    ctx.fillRect(rocket.x + 45, rocket.y + 75, 15, 30);
    // Hublot bleu cyan
    ctx.fillStyle = '#06b6d4'; ctx.fillRect(rocket.x + 22, rocket.y + 35, 16, 16);
    
    ctx.restore();
    ctx.restore();
}

function gameLoop() { update(); draw(); if (!gameOver) requestAnimationFrame(gameLoop); }

function declencherGameOver() {
    gameOver = true;
    document.getElementById("final-score-text").innerText = "Votre puissance finale : " + score + " ⚡";
    document.getElementById("game-over-screen").style.display = "flex";
    
    let pseudo = prompt("Entrez votre pseudo pour le classement du week-end :");
    if (!pseudo || pseudo.trim() === "") pseudo = "Pilote";

    topScoresLocaux.push({ pseudo: pseudo, score: score });
    topScoresLocaux.sort((a, b) => b.score - a.score);
    afficherLeTableau(pseudo, score);

    fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ pseudo: pseudo, score: score }) });
}

function afficherLeTableau(monPseudo, monScore) {
    let html = "";
    topScoresLocaux.slice(0, 5).forEach((joueur, index) => {
        let style = joueur.pseudo === monPseudo && joueur.score === monScore ? 'style="color:#fbbf24; font-weight:bold;"' : '';
        html += `<div class="leaderboard-row" ${style}><span>${index+1}. ${joueur.pseudo}</span><span>${joueur.score} ⚡</span></div>`;
    });
    document.getElementById("leaderboard-content").innerHTML = html;
}

function recommencer() { document.location.reload(); }

function piloter(clientX) {
    const rect = canvas.getBoundingClientRect();
    let echelle = canvas.width / rect.width;
    let bruteTarget = ((clientX - rect.left) * echelle) - rocket.width / 2;
    rocket.targetX = Math.max(15, Math.min(canvas.width - rocket.width - 15, bruteTarget));
}

window.addEventListener("mousemove", (e) => { piloter(e.clientX); });
window.addEventListener("touchmove", (e) => { if(e.touches.length > 0) piloter(e.touches[0].clientX); }, { passive: false });
</script>
</body>
</html>
