<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Course Spatiale - Progression Épurée</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; background: #0d1117; color: white; font-family: 'Segoe UI', Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100%; max-width: 450px; height: 100vh; max-height: 800px; box-shadow: 0 0 30px rgba(0,0,0,0.8); background: #0b0f19; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI */
        #ui-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; padding: 15px; }
        .hud-box { position: absolute; background: rgba(16, 24, 48, 0.85); padding: 8px 12px; border-radius: 6px; border: 2px solid #3b82f6; font-weight: bold; font-size: 16px; }
        #score-box { top: 15px; left: 15px; }
        #speed-box { top: 55px; left: 15px; }
        
        #jauge-container { position: absolute; right: 15px; top: 100px; width: 25px; height: 220px; background: rgba(16, 24, 48, 0.85); border: 2px solid #f59e0b; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column-reverse; }
        #jauge-fill { width: 100%; height: 100%; background: linear-gradient(to top, #f59e0b, #ef4444); transition: height 0.1s ease; }

        /* Game Over */
        #game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 15, 30, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; z-index: 10; }
        .btn { background: #3b82f6; color: white; border: none; padding: 12px 24px; font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 20px; }
        .leaderboard { width: 100%; max-width: 300px; margin: 20px 0; background: rgba(255,255,255,0.05); border-radius: 6px; padding: 10px; }
        .leaderboard-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="score-box" class="hud-box">PUISSANCE: <span id="scoreText">0</span> ⚡</div>
        <div id="speed-box" class="hud-box">VITESSE: <span id="speedText">1.0x</span></div>
        <div id="jauge-container"><div id="jauge-fill"></div></div>
    </div>
    <div id="game-over-screen">
        <h1 style="color: #ef4444;">FIN DE TRANSMISSION</h1>
        <p id="final-score-text" style="font-size: 20px;">Score : 0</p>
        <h3>🏆 TOP 5 DU WEEK-END</h3>
        <div class="leaderboard" id="leaderboard-content"><div class="leaderboard-row"><span>Chargement...</span></div></div>
        <button class="btn" onclick="recommencer()">RECOLLER</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-14uN1svuWyiSZN3yDsLpXKxaJKCsuRNZAvlvGCAoSjp_7fFjROydAhcinzHJgw3M/exec";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 450; canvas.height = 800;

// Gestion des images avec états de chargement individuels
const imgs = {
    fond: { img: new Image(), prete: false },
    fusee: { img: new Image(), prete: false },
    meteorite: { img: new Image(), prete: false },
    booster: { img: new Image(), prete: false },
    satellite: { img: new Image(), prete: false },
    missile: { img: new Image(), prete: false }
};

imgs.fond.img.src = 'fond_decollage.png';       imgs.fond.img.onload = () => imgs.fond.prete = true;
imgs.fusee.img.src = 'fusee.png';               imgs.fusee.img.onload = () => { imgs.fusee.prete = true; redimensionnerFusee(); };
imgs.meteorite.img.src = 'meteorite.png';       imgs.meteorite.img.onload = () => imgs.meteorite.prete = true;
imgs.booster.img.src = 'booster.png';           imgs.booster.img.onload = () => imgs.booster.prete = true;
imgs.satellite.img.src = 'satellite.png';       imgs.satellite.img.onload = () => imgs.satellite.prete = true;
imgs.missile.img.src = 'missile.png';           imgs.missile.img.onload = () => imgs.missile.prete = true;

// Fusée
const rocket = { x: 195, y: 600, width: 60, height: 165, targetX: 195 };
function redimensionnerFusee() {
    rocket.height = rocket.width * (imgs.fusee.img.naturalHeight / imgs.fusee.img.naturalWidth);
    rocket.y = canvas.height - rocket.height - 40;
}

// Variables d'état
let score = 0;
let gameSpeed = 4; 
let timeElapsed = 0;
let gameOver = false;
let energie = 50; 
const drainParFrame = 6.0 / 60; 

let cameraY = 0;
let atteintEspace = false;
let items = [];
let topScoresLocaux = [];

prechargerScores();
spawnItem();
gameLoop();

function prechargerScores() {
    fetch(SCRIPT_URL).then(r => r.json()).then(d => { if(Array.isArray(d)) { topScoresLocaux = d; afficherLeTableau("", 0); } }).catch(()=>{});
}

function spawnItem() {
    if (gameOver) return;

    let mult = gameSpeed / 4; 
    let type = "obstacle";
    let sousType = "booster";

    if (mult < 1.5) {
        type = "booster";
    } else {
        type = (Math.random() < 0.35) ? "booster" : "obstacle";
    }

    if (type === "obstacle") {
        if (mult >= 1.5 && mult < 2.2) {
            sousType = "satellite";
        } else if (mult >= 2.2 && mult < 3.0) {
            sousType = "meteorite";
        } else {
            sousType = (Math.random() < 0.25) ? "missile" : "meteorite";
        }
    }

    let item = {
        x: Math.random() * (canvas.width - 70),
        y: -100,
        width: 50, height: 50,
        type: type, sousType: sousType,
        vy: 1, vx: 0,
        timerMissile: 0
    };

    if (sousType === "satellite") {
        item.width = 110; item.height = 85;
        item.vy = 0.4; 
        item.vx = (Math.random() - 0.5) * 0.5; 
    } else if (sousType === "meteorite") {
        let size = 45 + Math.random() * 30;
        item.width = size; item.height = size;
        item.vy = 0.85; 
        item.vx = (Math.random() - 0.5) * 1.5; 
    } else if (sousType === "missile") {
        item.width = 25; item.height = 70;
        item.vy = 0.1; 
    } else if (type === "booster") {
        item.width = 90; item.height = 50;
        item.vy = 1.0;
    }

    items.push(item);

    let delaiSpawn = Math.max(500, 1600 - (gameSpeed * 40));
    setTimeout(spawnItem, delaiSpawn);
}

function update() {
    if (gameOver) return;

    timeElapsed++;
    gameSpeed = 4 + Math.log(1 + timeElapsed * 0.001) * 6;
    if (gameSpeed > 18) gameSpeed = 18;

    let mult = gameSpeed / 4;
    document.getElementById("speedText").innerText = mult.toFixed(1) + "x";

    energie -= drainParFrame;
    if (energie < 0) energie = 0;
    document.getElementById("jauge-fill").style.height = energie + "%";

    if (energie === 0) { declencherGameOver(); return; }

    rocket.x += (rocket.targetX - rocket.x) * 0.22;

    if (imgs.fond.prete && imgs.fond.img.naturalHeight > 0) {
        let echelle = canvas.width / imgs.fond.img.naturalWidth;
        let hRendu = imgs.fond.img.naturalHeight * echelle;
        if (!atteintEspace) {
            cameraY += gameSpeed * 0.25;
            if (cameraY >= hRendu - canvas.height) atteintEspace = true;
        } else {
            cameraY = (cameraY + gameSpeed * 0.25) % canvas.height;
        }
    }

    for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];

        if (item.sousType === "missile") {
            item.timerMissile += 1/60;
            if (item.timerMissile < 0.4) {
                let cibleX = rocket.x + rocket.width/2 - item.width/2;
                item.x += (cibleX - item.x) * 0.1;
            } else if (item.timerMissile >= 0.4 && item.vy < 1.5) {
                item.vy = 1.8;
            }
        }

        item.y += gameSpeed * item.vy;
        item.x += item.vx;

        if (item.sousType !== "missile" && (item.x < 0 || item.x + item.width > canvas.width)) {
            item.vx = -item.vx;
        }

        // Hitboxes ajustées à 70% pour le confort
        let rBox = { x: rocket.x + rocket.width * 0.15, y: rocket.y + rocket.height * 0.1, w: rocket.width * 0.7, h: rocket.height * 0.8 };
        let iBox = { x: item.x + item.width * 0.15, y: item.y + item.height * 0.1, w: item.width * 0.7, h: item.height * 0.8 };

        if (rBox.x < iBox.x + iBox.w && rBox.x + rBox.w > iBox.x && rBox.y < iBox.y + iBox.h && rBox.y + rBox.h > iBox.y) {
            if (item.type === "booster") {
                score += 10;
                energie = Math.min(100, energie + 25); 
                items.splice(i, 1);
                document.getElementById("scoreText").innerText = score;
                continue;
            } else {
                declencherGameOver();
                return;
            }
        }

        if (item.y > canvas.height) {
            items.splice(i, 1);
            score += (item.type === "obstacle") ? 2 : 0;
            document.getElementById("scoreText").innerText = score;
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (imgs.fond.prete && imgs.fond.img.naturalHeight > 0) {
        let echelle = canvas.width / imgs.fond.img.naturalWidth;
        let hRendu = imgs.fond.img.naturalHeight * echelle;
        if (!atteintEspace) {
            ctx.drawImage(imgs.fond.img, 0, -(hRendu - canvas.height) + cameraY, canvas.width, hRendu);
        } else {
            ctx.drawImage(imgs.fond.img, 0, 0, imgs.fond.img.naturalWidth, imgs.fond.img.naturalWidth * (canvas.height/canvas.width), 0, cameraY, canvas.width, canvas.height);
            ctx.drawImage(imgs.fond.img, 0, 0, imgs.fond.img.naturalWidth, imgs.fond.img.naturalWidth * (canvas.height/canvas.width), 0, cameraY - canvas.height, canvas.width, canvas.height);
        }
    } else {
        ctx.fillStyle = "#0b0f19"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Dessin au cas par cas selon l'état de chargement de CHAQUE image
    items.forEach(item => {
        if (item.type === "booster") {
            if (imgs.booster.prete) ctx.drawImage(imgs.booster.img, item.x, item.y, item.width, item.height);
            else { ctx.font = "35px Arial"; ctx.fillText("🔋", item.x, item.y + 35); }
        } else {
            if (item.sousType === "satellite") {
                if (imgs.satellite.prete) ctx.drawImage(imgs.satellite.img, item.x, item.y, item.width, item.height);
                else { ctx.font = "40px Arial"; ctx.fillText("🛰️", item.x, item.y + 40); }
            } else if (item.sousType === "meteorite") {
                if (imgs.meteorite.prete) ctx.drawImage(imgs.meteorite.img, item.x, item.y, item.width, item.height);
                else { ctx.font = "35px Arial"; ctx.fillText("☄️", item.x, item.y + 35); }
            } else if (item.sousType === "missile") {
                if (imgs.missile.prete) ctx.drawImage(imgs.missile.img, item.x, item.y, item.width, item.height);
                else { ctx.font = "35px Arial"; ctx.fillText(item.timerMissile > 0.4 ? "🔥" : "🚨", item.x, item.y + 40); }
            }
        }
    });

    // Dessin Joueur indépendant
    if (imgs.fusee.prete) ctx.drawImage(imgs.fusee.img, rocket.x, rocket.y, rocket.width, rocket.height);
    else { ctx.font = "50px Arial"; ctx.fillText("🚀", rocket.x, rocket.y + 50); }
}

function gameLoop() {
    update();
    draw();
    if (!gameOver) requestAnimationFrame(gameLoop);
}

function declencherGameOver() {
    gameOver = true;
    document.getElementById("final-score-text").innerText = "Votre puissance finale : " + score + " ⚡";
    document.getElementById("game-over-screen").style.display = "flex";
    
    let pseudo = prompt("Entrez votre pseudo :");
    if (!pseudo || pseudo.trim() === "") pseudo = "Pilote Anonyme";

    topScoresLocaux.push({ pseudo: pseudo, score: score });
    topScoresLocaux.sort((a, b) => b.score - a.score);
    afficherLeTableau(pseudo, score);

    fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ pseudo: pseudo, score: score }) })
    .then(() => setTimeout(recupererScoresEnLigne, 1000)).catch(()=>{});
}

function afficherLeTableau(mp, ms) {
    let html = "";
    if (topScoresLocaux.length === 0) html = '<div class="leaderboard-row"><span>Aucun score enregistré</span></div>';
    else {
        topScoresLocaux.slice(0, 5).forEach((j, i) => {
            let active = j.pseudo === mp && j.score === ms ? 'style="color:#f59e0b; font-weight:bold;"' : '';
            html += `<div class="leaderboard-row" ${active}><span>${i+1}. ${j.pseudo}</span><span>${j.score} ⚡</span></div>`;
        });
    }
    document.getElementById("leaderboard-content").innerHTML = html;
}

function recupererScoresEnLigne() {
    fetch(SCRIPT_URL).then(r => r.json()).then(d => { if(d && d.length > 0) { topScoresLocaux = d; topScoresLocaux.sort((a,b)=>b.score-a.score); afficherLeTableau("", 0); } }).catch(()=>{});
}

function recommencer() { document.location.reload(); }

function piloter(clientX) {
    const rect = canvas.getBoundingClientRect();
    let echelle = canvas.width / rect.width;
    rocket.targetX = Math.max(0, Math.min(canvas.width - rocket.width, ((clientX - rect.left) * echelle) - rocket.width / 2));
}
window.addEventListener("mousemove", (e) => piloter(e.clientX));
window.addEventListener("touchmove", (e) => { if(e.touches.length > 0) piloter(e.touches[0].clientX); }, { passive: false });
</script>
</body>
</html>
