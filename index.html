<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Survie - Guidage & Progression</title>
    <style>
        body {
            margin: 0;
            background-color: #0d0e15;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #ui-container {
            margin-bottom: 10px;
            text-align: center;
        }

        #scoreboard {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 200, 0.5);
        }

        #telemetry {
            font-size: 14px;
            color: #8a99ad;
            margin-top: 5px;
        }

        canvas {
            border: 2px solid #34495e;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
            cursor: none; /* Le vaisseau suit la souris */
        }

        #game-over-screen {
            display: none;
            position: absolute;
            background: rgba(13, 14, 21, 0.85);
            border: 2px solid #e74c3c;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }

        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 15px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="scoreboard">Score : <span id="score-val">0</span></div>
        <div id="telemetry">
            Densité Astéroïdes : <span id="ast-density">Min</span> | 
            Vitesse Fusées : <span id="rocket-speed">Lente</span>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="game-over-screen" id="gameOver">
        <h2>Vaisseau Détruit !</h2>
        <p>Votre score : <span id="final-score">0</span></p>
        <button onclick="resetGame()">Recommencer</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('game-over-screen');

        // Variables de jeu
        let player = { x: 400, y: 300, radius: 15 };
        let mouse = { x: 400, y: 300 };
        let asteroids = [];
        let rockets = [];
        let score = 0;
        let isGameOver = false;

        // Paramètres d'équilibrage évolutif
        const START_ROCKET_SPEED = 1.5;   // Très lent au début pour voir le guidage
        const MAX_ROCKET_SPEED = 5.0;     // Vitesse max en fin de partie
        const START_ASTEROID_RATE = 0.015; // Moins d'astéroïdes au départ
        const MAX_ASTEROID_RATE = 0.05;   // Limite raisonnable pour éviter le mur infranchissable
        
        // Écouteurs d'événements
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        function spawnAsteroid() {
            // Ajustement progressif de la densité selon le score (max atteint à 2000 points)
            let progression = Math.min(score / 2000, 1);
            let spawnChance = START_ASTEROID_RATE + (MAX_ASTEROID_RATE - START_ASTEROID_RATE) * progression;

            if (Math.random() < spawnChance) {
                let side = Math.floor(Math.random() * 4);
                let x, y, vx, vy;
                let size = Math.random() * 20 + 10;

                if (side === 0) { x = -size; y = Math.random() * canvas.height; vx = Math.random() * 2 + 1; vy = Math.random() * 2 - 1; }
                else if (side === 1) { x = canvas.width + size; y = Math.random() * canvas.height; vx = -(Math.random() * 2 + 1); vy = Math.random() * 2 - 1; }
                else if (side === 2) { x = Math.random() * canvas.width; y = -size; vx = Math.random() * 2 - 1; vy = Math.random() * 2 + 1; }
                else { x = Math.random() * canvas.width; y = canvas.height + size; vx = Math.random() * 2 - 1; vy = -(Math.random() * 2 + 1); }

                asteroids.push({ x, y, vx, vy, radius: size });
            }
        }

        function spawnRocket() {
            // Apparition d'une fusée toutes les ~3 secondes
            if (Math.random() < 0.006) {
                let x = Math.random() * canvas.width;
                // Pop en haut ou en bas pour traverser l'écran
                let y = Math.random() < 0.5 ? -10 : canvas.height + 10;
                
                // Calcul de la vitesse de cette fusée indexée sur le score actuel
                let progression = Math.min(score / 2000, 1);
                let speed = START_ROCKET_SPEED + (MAX_ROCKET_SPEED - START_ROCKET_SPEED) * progression;

                rockets.push({
                    x: x,
                    y: y,
                    vx: 0,
                    vy: 0,
                    radius: 8,
                    speed: speed,
                    turnSpeed: 0.04 // Permet une belle courbe de guidage fluide
                });
            }
        }

        function update() {
            if (isGameOver) return;

            score++;
            document.getElementById('score-val').innerText = score;

            // Mise à jour de la télémétrie sur l'UI
            let progression = Math.min(score / 2000, 1);
            document.getElementById('ast-density').innerText = Math.round(progression * 100) + "%";
            document.getElementById('rocket-speed').innerText = (START_ROCKET_SPEED + (MAX_ROCKET_SPEED - START_ROCKET_SPEED) * progression).toFixed(1) + " px/f";

            // Inertie douce du vaisseau vers la souris
            player.x += (mouse.x - player.x) * 0.15;
            player.y += (mouse.y - player.y) * 0.15;

            // Gestion des Astéroïdes
            spawnAsteroid();
            for (let i = asteroids.length - 1; i >= 0; i--) {
                let a = asteroids[i];
                a.x += a.vx;
                a.y += a.vy;

                // Collision joueur
                let dist = Math.hypot(player.x - a.x, player.y - a.y);
                if (dist < player.radius + a.radius) endGame();

                // Nettoyage hors écran
                if (a.x < -50 || a.x > canvas.width + 50 || a.y < -50 || a.y > canvas.height + 50) {
                    asteroids.splice(i, 1);
                }
            }

            // Gestion des Fusées Guidées
            spawnRocket();
            for (let i = rockets.length - 1; i >= 0; i--) {
                let r = rockets[i];

                // Calcul du vecteur vers le joueur
                let dx = player.x - r.x;
                let dy = player.y - r.y;
                let angleToPlayer = Math.atan2(dy, dx);

                // Angle actuel de la fusée basé sur sa vitesse actuelle
                let currentAngle = Math.atan2(r.vy, r.vx);
                if (r.vx === 0 && r.vy === 0) currentAngle = angleToPlayer;

                // Interpolation de l'angle pour créer l'effet "virage/guidage" visible
                let angleDiff = angleToPlayer - currentAngle;
                // Normalisation de l'angle entre -PI et PI
                angleDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
                
                let newAngle = currentAngle + Math.sign(angleDiff) * Math.min(Math.abs(angleDiff), r.turnSpeed);

                // Application de la vitesse
                r.vx = Math.cos(newAngle) * r.speed;
                r.vy = Math.sin(newAngle) * r.speed;

                r.x += r.vx;
                r.y += r.vy;

                // Collision joueur
                let dist = Math.hypot(player.x - r.x, player.y - r.y);
                if (dist < player.radius + r.radius) endGame();

                // Les fusées s'autodétruisent après 8 secondes pour ne pas surcharger l'écran
                if (!r.life) r.life = 0;
                r.life++;
                if (r.life > 480) rockets.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dessiner le Joueur (Vaisseau bleu néon)
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#00f0ff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f0ff';
            ctx.fill();
            ctx.closePath();

            // Dessiner les Astéroïdes (Gris neutre)
            ctx.shadowBlur = 0; // Reset shadow pour les performances
            ctx.fillStyle = '#7f8c8d';
            asteroids.forEach(a => {
                ctx.beginPath();
                ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.closePath();
            });

            // Dessiner les Fusées Guidées (Rouge triangle agressif + traînée)
            rockets.forEach(r => {
                let angle = Math.atan2(r.vy, r.vx);
                
                ctx.save();
                ctx.translate(r.x, r.y);
                ctx.rotate(angle);

                // Traînée de la fusée
                ctx.beginPath();
                ctx.fillStyle = 'rgba(231, 76, 60, 0.6)';
                ctx.moveTo(-10, 0);
                ctx.lineTo(-20, -4);
                ctx.lineTo(-20, 4);
                ctx.fill();

                // Corps de la fusée
                ctx.beginPath();
                ctx.fillStyle = '#e74c3c';
                ctx.moveTo(12, 0);
                ctx.lineTo(-8, -7);
                ctx.lineTo(-8, 7);
                ctx.fill();
                
                ctx.restore();
            });
        }

        function loop() {
            update();
            draw();
            if (!isGameOver) requestAnimationFrame(loop);
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('final-score').innerText = score;
            gameOverScreen.style.display = 'block';
        }

        function resetGame() {
            asteroids = [];
            rockets = [];
            score = 0;
            isGameOver = false;
            player.x = 400;
            player.y = 300;
            gameOverScreen.style.display = 'none';
            loop();
        }

        // Lancement du jeu
        loop();
    </script>
</body>
</html>
