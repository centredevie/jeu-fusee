<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montée en puissance - Intensification</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            background: #0d1117;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 800px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            background: #0b0f19;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI HUD */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            padding: 15px;
        }
        .hud-box {
            position: absolute;
            background: rgba(16, 24, 48, 0.85);
            padding: 8px 12px;
            border-radius: 6px;
            border: 2px solid #3b82f6;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 0.5px;
        }
        #score-box { top: 15px; left: 15px; }
        #speed-box { top: 55px; left: 15px; }
        
        /* Message d'alerte */
        #alert-box {
            position: absolute;
            top: 110px;
            left: 15px;
            right: 55px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            padding: 8px;
            border-radius: 4px;
            display: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            animation: clignote 0.4s infinite alternate;
        }
        .alert-surchargé { background: #3b82f6; border: 2px solid #60a5fa; color: white; box-shadow: 0 0 20px #3b82f6; }
        .alert-boss { background: #ef4444; border: 2px solid #f87171; color: white; box-shadow: 0 0 20px #ef4444; }

        @keyframes clignote {
            from { opacity: 0.5; } to { opacity: 1; }
        }

        #jauge-container {
            position: absolute;
            right: 15px;
            top: 100px;
            width: 24px;
            height: 250px;
            background: rgba(16, 24, 48, 0.85);
            border: 2px solid #f59e0b;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
        }
        #jauge-fill {
            width: 100%;
            height: 40%; 
            background: linear-gradient(to top, #f59e0b, #ef4444);
            transition: height 0.1s linear;
        }
        #jauge-fill.surcharge {
            background: linear-gradient(to top, #3b82f6, #ffffff) !important;
            animation: pulse-blue 0.1s infinite;
        }
        @keyframes pulse-blue {
            0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; }
        }

        #jauge-label {
            position: absolute;
            right: -55px;
            top: 195px;
            transform: rotate(-90deg);
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #f59e0b;
        }

        /* Game Over */
        #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 30, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .leaderboard {
            width: 100%;
            max-width: 300px;
            margin: 20px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 10px;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="score-box" class="hud-box">PUISSANCE: <span id="scoreText">0</span> ⚡</div>
        <div id="speed-box" class="hud-box">VITESSE: <span id="speedText">1.0x</span></div>
        <div id="alert-box">BOOSTER ACTIF</div>
        <div id="jauge-container">
            <div id="jauge-fill"></div>
            <div id="jauge-label">Montée en puissance</div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1 style="color: #ef4444; margin-bottom: 5px; letter-spacing: 1px;">FIN DE TRANSMISSION</h1>
        <p id="final-score-text" style="font-size: 20px; margin-top: 5px;">Votre score : 0</p>
        <h3>🏆 TOP 5 DU WEEK-END</h3>
        <div class="leaderboard" id="leaderboard-content">
            <div class="leaderboard-row"><span>Chargement du classement...</span></div>
        </div>
        <button class="btn" onclick="recommencer()">REDECOLLER</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-14uN1svuWyiSZN3yDsLpXKxaJKCsuRNZAvlvGCAoSjp_7fFjROydAhcinzHJgw3M/exec"; 

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 450;
canvas.height = 800;

// --- ASSETS ---
const imgFond = new Image(); imgFond.src = 'fond_decollage.png';
const imgFusee = new Image(); imgFusee.src = 'fusee.png';
const imgMeteorite = new Image(); imgMeteorite.src = 'meteorite.png';
const imgBooster = new Image(); imgBooster.src = 'booster.png';
const imgSatellite = new Image(); imgSatellite.src = 'satellite.png';
const imgMissile = new Image(); imgMissile.src = 'missile.png';

let imgAvion = new Image(); 
imgAvion.crossOrigin = "anonymous"; 
imgAvion.src = 'avion.png';

let assetsPrets = { fond: false, fusee: false, meteorite: false, booster: false, satellite: false, missile: false, avion: false };
imgFond.onload = () => assetsPrets.fond = true;
imgMeteorite.onload = () => assetsPrets.meteorite = true;
imgBooster.onload = () => assetsPrets.booster = true;
imgSatellite.onload = () => assetsPrets.satellite = true;
imgMissile.onload = () => assetsPrets.missile = true;

imgAvion.onload = () => {
    try {
        let tempCanvas = document.createElement('canvas');
        let tempCtx = tempCanvas.getContext('2d');
        tempCanvas.width = imgAvion.width;
        tempCanvas.height = imgAvion.height;
        tempCtx.drawImage(imgAvion, 0, 0);
        
        let imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
        let data = imgData.data;
        
        for (let i = 0; i < data.length; i += 4) {
            if (data[i] > 240 && data[i+1] > 240 && data[i+2] > 240) {
                data[i+3] = 0; 
            }
        }
        tempCtx.putImageData(imgData, 0, 0);
        let cleanImg = new Image();
        cleanImg.src = tempCanvas.toDataURL();
        cleanImg.onload = () => {
            imgAvion = cleanImg;
            assetsPrets.avion = true;
        };
    } catch(e) { assetsPrets.avion = true; }
};

const rocketBaseW = 60;
const rocket = {
    x: canvas.width / 2 - rocketBaseW / 2,
    y: canvas.height - 220,
    width: rocketBaseW,
    height: rocketBaseW * 2.76,
    targetX: canvas.width / 2 - rocketBaseW / 2
};

imgFusee.onload = () => { 
    assetsPrets.fusee = true;
    rocket.height = rocket.width * (imgFusee.naturalHeight / imgFusee.naturalWidth);
    rocket.y = canvas.height - rocket.height - 40;
};

// --- PARAMÈTRES DE JEU ÉVOLUTIFS ---
let score = 0, baseSpeed = 4.0, gameSpeed = 4.0, timeElapsed = 0, gameOver = false, items = [], topScoresLocaux = [];
let energie = 40; 
const energieMax = 100; 
let surchargeActive = false, surchargeTimer = 0, cameraY = 0, loopSpaceY = 0, atteintEspaceEnHaut = false, pileObjetsProgrammes = [];

prechargerScores();
gameLoop();
scheduleNextSpawn();

function prechargerScores() { fetch(SCRIPT_URL).then(res => res.json()).then(data => { if(Array.isArray(data)) { topScoresLocaux = data; afficherLeTableau("", 0); } }).catch(() => {}); }
function getProgressionFactor() { let currentMult = gameSpeed / 4.0; return Math.max(0.0, Math.min(1.0, (currentMult - 1.0) / 3.5)); }
function mélangerTableau(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

function scheduleNextSpawn() {
    if (gameOver) return;
    let vActuelle = Math.max(1.0, gameSpeed / 4.0);
    let alpha = getProgressionFactor();
    
    // Intensification globale du timing d'apparition en phase intermédiaire
    let reductionTransition = (vActuelle >= 2.9 && vActuelle <= 3.5) ? 180 : 0;
    let tempsAttente = (1200 / Math.sqrt(vActuelle)) - (alpha * ((1200 - 650) / Math.sqrt(vActuelle))) - reductionTransition;
    tempsAttente = Math.max(260, tempsAttente);
    
    if (surchargeActive) tempsAttente *= 0.75; 
    setTimeout(() => { genererFluxStructure(vActuelle); scheduleNextSpawn(); }, tempsAttente);
}

function genererFluxStructure(vActuelle) {
    if (gameOver) return;
    let phaseActuelle = 1;
    if (vActuelle < 1.3) phaseActuelle = 1; 
    else if (vActuelle < 2.0) phaseActuelle = 2; // L'avion arrive désormais plus vite dès vActuelle >= 1.3
    else if (vActuelle < 2.6) phaseActuelle = 3; 
    else if (vActuelle < 3.5) phaseActuelle = 4; // Phase intermédiaire cible (2.9x - 3.5x)
    else phaseActuelle = 5;

    if (pileObjetsProgrammes.length === 0) {
        if (phaseActuelle === 1) pileObjetsProgrammes = ["booster", "booster"]; 
        else if (phaseActuelle === 2) pileObjetsProgrammes = mélangerTableau(["booster", "obstacle", "booster", "obstacle"]);
        else if (phaseActuelle === 3) pileObjetsProgrammes = mélangerTableau(["booster", "obstacle", "booster", "obstacle", "obstacle"]);
        // INTENSIFICATION PHASE 4 : Plus de météorites dans la boucle
        else if (phaseActuelle === 4) pileObjetsProgrammes = mélangerTableau(["obstacle", "booster", "obstacle", "obstacle", "booster", "obstacle"]);
        else pileObjetsProgrammes = mélangerTableau(["booster", "obstacle", "obstacle", "booster", "obstacle", "obstacle"]);
    }
    let typeChoisi = pileObjetsProgrammes.shift() || "booster";
    let avionExisteDeja = items.some(item => item.sousType === "avion");
    if (phaseActuelle === 2 && typeChoisi === "obstacle" && avionExisteDeja) { typeChoisi = "booster"; } 
    triggerSpawn(typeChoisi, vActuelle, phaseActuelle);
}

function triggerSpawn(typeChoisi, vActuelle, phaseActuelle) {
    let sousType = "avion", itemWidth, itemHeight, speedFactor = 1.0, vx = 0, xInitial = Math.random() * (canvas.width - 80), yInitial = -100;
    let alpha = getProgressionFactor();

    if (typeChoisi === "obstacle") {
        if (phaseActuelle === 2) {
            sousType = "avion";
            const scale = 0.38;
            itemWidth = 500 * scale; 
            itemHeight = 174 * scale;
            speedFactor = 0.32; 
            xInitial = canvas.width; 
            vx = -2.7; 
            yInitial = 70 + Math.random() * 180; 

        } else if (phaseActuelle === 3) {
            sousType = "satellite"; const scale = 0.26; itemWidth = 530 * scale; itemHeight = 415 * scale; speedFactor = 0.35; vx = (Math.random() - 0.5) * 0.2; yInitial = -itemHeight;
        } else if (phaseActuelle === 4) {
            // INTENSIFICATION DES MÉTÉORITES (Zone de stagnation 2.9x - 3.5x)
            sousType = "meteorite"; 
            const scale = 0.14 + (Math.random() * 0.08); // Légèrement plus grosses
            itemWidth = 435 * scale; 
            itemHeight = 410 * scale; 
            speedFactor = 0.72 + (alpha * 0.15); 
            vx = (Math.random() - 0.5) * (4.0 + alpha * 2.0); // Trajectoires diagonales beaucoup plus agressives
            yInitial = -itemHeight;
        } else {
            let fuséePresente = items.some(item => item.sousType === "missile");
            if (!fuséePresente && Math.random() < 0.35) {
                sousType = "missile"; const scale = 0.20; itemWidth = 170 * scale; itemHeight = 486 * scale; speedFactor = 0.10; let centreRocket = rocket.x + rocket.width / 2; let centreItem = xInitial + itemWidth / 2; vx = (centreRocket - centreItem) * 0.004; yInitial = -itemHeight;
            } else {
                sousType = "meteorite"; const scale = 0.11 + (Math.random() * 0.07); itemWidth = 435 * scale; itemHeight = 410 * scale; speedFactor = 0.80; vx = (Math.random() - 0.5) * 3.5; yInitial = -itemHeight;
            }
        }
    } else {
        const scale = 0.24; itemWidth = 500 * scale; itemHeight = 281 * scale; speedFactor = 0.85; sousType = "booster"; yInitial = -itemHeight;
    }

    let satellitesEnEcran = items.some(item => item.sousType === "satellite");
    let decalageSecurite = (phaseActuelle === 3 && typeChoisi === "obstacle" && satellitesEnEcran) ? 150 : 0;
    items.push({ x: xInitial, y: yInitial - decalageSecurite, width: itemWidth, height: itemHeight, type: typeChoisi, sousType: sousType, speedFactor: speedFactor, vx: vx, allume: false });
}

function update() {
    if (gameOver) return;

    if (surchargeActive) {
        surchargeTimer--;
        if (surchargeTimer <= 0) { surchargeActive = false; document.getElementById("jauge-fill").classList.remove("surcharge"); document.getElementById("alert-box").style.display = "none"; }
    }

    if (assetsPrets.fond && imgFond.naturalHeight > 0) {
        let ratio = canvas.width / imgFond.naturalWidth;
        let hEcran = imgFond.naturalHeight * ratio;
        let seuil = hEcran - canvas.height;

        let multiplicateurVisuel = surchargeActive ? 2.5 : 1.0;
        if (!atteintEspaceEnHaut) {
            cameraY += gameSpeed * 0.25 * multiplicateurVisuel;
            if (cameraY >= seuil) { atteintEspaceEnHaut = true; loopSpaceY = 0; }
        } else {
            loopSpaceY = (loopSpaceY + gameSpeed * 0.25 * multiplicateurVisuel) % canvas.height;
        }
    }

    timeElapsed += 1;
    gameSpeed = Math.min(18.0, baseSpeed + Math.log(1 + timeElapsed * 0.001) * 6.5);
    let vActuelle = gameSpeed / 4.0;
    document.getElementById("speedText").innerText = vActuelle.toFixed(1) + "x";

    let drain = surchargeActive ? (5.0 + vActuelle * 2.0) : (3.2 + vActuelle * 1.1);
    energie -= drain * (1/60);
    if (energie <= 0) { energie = 0; declencherGameOver(); return; }
    document.getElementById("jauge-fill").style.height = energie + "%";

    let fuséePresente = items.some(item => item.sousType === "missile");
    let alertBox = document.getElementById("alert-box");
    if (surchargeActive) { alertBox.innerText = "⚡ SUPERBOOST ACTIF ⚡"; alertBox.className = "alert-surchargé"; alertBox.style.display = "block"; } 
    else if (vActuelle >= 3.5 && fuséePresente) { alertBox.innerText = "🚨 ALERTE FUSEE 🚨"; alertBox.className = "alert-boss"; alertBox.style.display = "block"; } 
    else { alertBox.style.display = "none"; }

    rocket.x += (rocket.targetX - rocket.x) * (surchargeActive ? 0.45 : 0.22);

    for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        
        if (item.sousType === "missile") {
            if (item.y > 100 && !item.allume) { item.allume = true; let multi = 0.02 + getProgressionFactor() * 0.03; item.vx = Math.max(-4.5, Math.min(4.5, (rocket.x - item.x) * multi)); }
            if (item.allume) { item.speedFactor = Math.min(1.10 + getProgressionFactor() * 0.35, item.speedFactor + 0.03); }
        }

        item.y += gameSpeed * item.speedFactor;
        item.x += item.vx;

        if (item.sousType !== "avion") { if (item.x < 0 || item.x + item.width > canvas.width) { item.vx = -item.vx; } }

        // AJUSTEMENT HITBOX : Un poil plus permissif sur l'avion (0.65) pour permettre les frôlements héroïques
        const scaleR = 0.65;
        let scaleI = (item.sousType === "satellite") ? 0.55 : (item.sousType === "missile") ? 0.60 : (item.sousType === "avion") ? 0.65 : 0.70; 
        
        let rw = rocket.width * scaleR, rh = rocket.height * scaleR;
        let rx = rocket.x + (rocket.width - rw)/2, ry = rocket.y + (rocket.height - rh)/2;
        let iw = item.width * scaleI, ih = item.height * scaleI;
        let ix = item.x + (item.width - iw)/2, iy = item.y + (item.height - ih)/2;

        if (rx < ix + iw && rx + rw > ix && ry < iy + ih && ry + rh > iy) {
            if (item.type === "booster") {
                if (vActuelle >= 3.5 && energie + 20 >= 99.5 && !surchargeActive) { surchargeActive = true; surchargeTimer = 210; document.getElementById("jauge-fill").classList.add("surcharge"); score += 50; energie = energieMax; } 
                else if (!surchargeActive) { energie = Math.min(energieMax, energie + 20); score += 15; } 
                else { score += 30; }
                items.splice(i, 1);
            } else { if (surchargeActive) { items.splice(i, 1); score += 10; } else { declencherGameOver(); return; } }
            document.getElementById("scoreText").innerText = score; continue;
        }

        if (item.y > canvas.height || item.x > canvas.width + 200 || item.x < -item.width - 200) {
            items.splice(i, 1);
            if (item.type === "obstacle") { score += (item.sousType === "missile") ? 8 : (item.sousType === "satellite") ? 3 : (item.sousType === "avion") ? 5 : 2; document.getElementById("scoreText").innerText = score; }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (assetsPrets.fond && imgFond.naturalHeight > 0) {
        let ratio = canvas.width / imgFond.naturalWidth;
        let hEcran = imgFond.naturalHeight * ratio;

        if (!atteintEspaceEnHaut) {
            ctx.drawImage(imgFond, 0, - (hEcran - canvas.height) + cameraY, canvas.width, hEcran);
        } else {
            ctx.drawImage(imgFond, 0, 0, imgFond.naturalWidth, imgFond.naturalWidth * (canvas.height / canvas.width), 0, loopSpaceY, canvas.width, canvas.height);
            ctx.drawImage(imgFond, 0, 0, imgFond.naturalWidth, imgFond.naturalWidth * (canvas.height / canvas.width), 0, loopSpaceY - canvas.height, canvas.width, canvas.height);
        }
    } else {
        ctx.fillStyle = "#0b0f19"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    items.forEach(item => {
        if (item.type === "obstacle") {
            if (item.sousType === "avion") {
                if (assetsPrets.avion) {
                    ctx.drawImage(imgAvion, item.x, item.y, item.width, item.height);
                } else { ctx.font = "42px Arial"; ctx.textAlign = "center"; ctx.fillText("🛩️", item.x + item.width/2, item.y + 30); }
            } else if (item.sousType === "satellite") { if (assetsPrets.satellite) ctx.drawImage(imgSatellite, item.x, item.y, item.width, item.height); else { ctx.font = "50px Arial"; ctx.fillText("🛰️", item.x + item.width/2, item.y + 35); }
            } else if (item.sousType === "missile") { if (assetsPrets.missile) { ctx.save(); ctx.translate(item.x + item.width/2, item.y + item.height/2); ctx.rotate(-Math.atan2(item.vx, gameSpeed * item.speedFactor)); ctx.drawImage(imgMissile, -item.width/2, -item.height/2, item.width, item.height); ctx.restore(); } else { ctx.font = "48px Arial"; ctx.fillText(item.allume ? "🔥🚀" : "🚨🚀", item.x + item.width/2, item.y + 35); }
            } else { if (assetsPrets.meteorite) ctx.drawImage(imgMeteorite, item.x, item.y, item.width, item.height); else { ctx.font = "38px Arial"; ctx.fillText("☄️", item.x + item.width/2, item.y + 30); } }
        } else { if (assetsPrets.booster) ctx.drawImage(imgBooster, item.x, item.y, item.width, item.height); else { ctx.font = "35px Arial"; ctx.fillText("🔋", item.x + item.width/2, item.y + 25); } }
    });

    ctx.save();
    let centreX = rocket.x + rocket.width / 2;
    if (surchargeActive) {
        if (Math.floor(surchargeTimer / 4) % 2 === 0) {
            ctx.shadowBlur = 35; ctx.shadowColor = "#3b82f6"; ctx.beginPath();
            ctx.arc(centreX, rocket.y + rocket.height/2, Math.max(rocket.width, rocket.height)*0.62, 0, 2*Math.PI);
            ctx.strokeStyle = "#60a5fa"; ctx.lineWidth = 4; ctx.stroke();
        }
    }

    if (assetsPrets.fusee) { ctx.drawImage(imgFusee, rocket.x, rocket.y, rocket.width, rocket.height); } else { ctx.font = "52px Arial"; ctx.fillText("🚀", rocket.x + rocket.width/2, rocket.y + 45); }
    ctx.restore();
}

function gameLoop() { update(); draw(); if (!gameOver) requestAnimationFrame(gameLoop); }
function declencherGameOver() { gameOver = true; document.getElementById("jauge-fill").classList.remove("surcharge"); document.getElementById("final-score-text").innerText = "Votre puissance finale : " + score + " ⚡"; document.getElementById("game-over-screen").style.display = "flex"; let pseudo = prompt("Pseudo :"); if (!pseudo || pseudo.trim() === "") pseudo = "Pilote Anonyme"; topScoresLocaux.push({ pseudo: pseudo, score: score }); topScoresLocaux.sort((a, b) => b.score - a.score); afficherLeTableau(pseudo, score); fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ pseudo: pseudo, score: score }) }).catch(() => {}); }
function afficherLeTableau(monPseudo, monScore) { let html = ""; topScoresLocaux.slice(0, 5).forEach((joueur, index) => { let clr = joueur.pseudo === monPseudo && joueur.score === monScore ? 'style="color:#f59e0b; font-weight:bold;"' : ''; html += `<div class="leaderboard-row" ${clr}><span>${index+1}. ${joueur.pseudo}</span><span>${joueur.score} ⚡</span></div>`; }); document.getElementById("leaderboard-content").innerHTML = html; }
function recommencer() { document.location.reload(); }
function piloter(clientX) { const rect = canvas.getBoundingClientRect(); rocket.targetX = Math.max(0, Math.min(canvas.width - rocket.width, ((clientX - rect.left) * (canvas.width / rect.width)) - rocket.width / 2)); }

window.addEventListener("mousemove", (e) => piloter(e.clientX));
window.addEventListener("touchmove", (e) => { if(e.touches.length > 0) piloter(e.touches[0].clientX); }, { passive: false });
</script>
</body>
</html>
