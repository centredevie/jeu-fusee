<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montée en Puissance - Le Jeu</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body {
            background: #090d16;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            box-shadow: 0 0 40px rgba(0,0,0,0.85);
            background: #111;
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* HUD Style Maquette */
        #ui-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; padding: 15px; z-index: 5; }
        .hud-box { 
            position: absolute; 
            background: rgba(14, 23, 41, 0.8); 
            padding: 10px 14px; 
            border-radius: 6px; 
            border: 2px solid #38bdf8; 
            font-weight: bold; 
            font-size: 15px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
        }
        #score-box { top: 15px; left: 15px; }
        #speed-box { top: 62px; left: 15px; }
        
        /* Super Jauge latérale droite de la maquette */
        #jauge-container { 
            position: absolute; 
            right: 15px; 
            top: 100px; 
            width: 28px; 
            height: 280px; 
            background: rgba(14, 23, 41, 0.8); 
            border: 2px solid #f59e0b; 
            border-radius: 14px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column-reverse;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        #jauge-fill { 
            width: 100%; 
            height: 0%; 
            background: linear-gradient(to top, #fbbf24, #f97316, #ef4444); 
            transition: height 0.1s linear; 
        }
        #jauge-label { 
            position: absolute; 
            right: -52px; 
            top: 225px; 
            transform: rotate(-90deg); 
            font-size: 9px; 
            font-weight: bold; 
            letter-spacing: 1.2px; 
            text-transform: uppercase; 
            color: #fbbf24; 
        }

        /* Écran Game Over */
        #game-over-screen { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(8, 12, 24, 0.97); 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            pointer-events: auto; 
            padding: 25px; 
            text-align: center; 
            z-index: 10; 
        }
        .btn { 
            background: #2563eb; 
            color: white; 
            border: none; 
            padding: 14px 28px; 
            font-size: 17px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }
        .leaderboard { width: 100%; max-width: 320px; margin: 20px 0; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; }
        .leaderboard-row { display: flex; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 15px; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="score-box" class="hud-box">PUISSANCE: <span id="scoreText">0</span> ⚡</div>
            <div id="speed-box" class="hud-box">VITESSE: <span id="speedText">1.0x</span></div>
            <div id="jauge-container"><div id="jauge-fill"></div><div id="jauge-label">Montée en puissance</div></div>
        </div>

        <div id="game-over-screen">
            <h1 style="color: #ef4444; margin-bottom: 5px; font-size: 26px; letter-spacing: 1px;">FIN DE TRANSMISSION</h1>
            <p id="final-score-text" style="font-size: 20px; color: #fbbf24; margin-top: 5px; font-weight: bold;">Votre score : 0</p>
            <h3 style="margin-bottom: 8px;">🏆 TOP 5 DU WEEK-END</h3>
            <div class="leaderboard" id="leaderboard-content">
                <div class="leaderboard-row"><span>Chargement du classement...</span></div>
            </div>
            <button class="btn" onclick="recommencer()">RECOLLER AU DÉCOLLAGE</button>
        </div>
    </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-14uN1svuWyiSZN3yDsLpXKxaJKCsuRNZAvlvGCAoSjp_7fFjROydAhcinzHJgw3M/exec"; 

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 450;
canvas.height = 800;

// --- CHARGEMENT DES IMAGES DE LA MAQUETTE (CDN Sécurisé) ---
const imgFond = new Image(); imgFond.src = 'fond.jpg';
const imgFusee = new Image(); imgFusee.src = 'fusee.png';
const imgMeteore = new Image(); imgMeteore.src = 'https://i.ibb.co/3W4Tz4n/meteore-voxel.png'; // Météorite pixel-art grise
const imgBatterie = new Image(); imgBatterie.src = 'https://i.ibb.co/yNfRWhq/batterie-voxel.png'; // Batterie lumineuse jaune-orange
const imgNuage = new Image(); imgNuage.src = 'https://i.ibb.co/YyY2Z1C/nuage-voxel.png'; // Nuage voxel blanc transparent

// Moteur de jeu
let score = 0; let gameSpeed = 4.5; let gameOver = false; let fondY = 0;
let superJauge = 0; let estInvincible = false;
let screenShake = 0; // Effet d'impact dynamique de la maquette

// Alignement parfait des proportions de la fusée (Hauteur respectée, non écrasée)
const rocket = { x: 192, y: 610, width: 66, height: 120, targetX: 192 };
let items = [];
let particules = [];
let topScoresLocaux = []; 

prechargerScores();
spawnItem();
gameLoop();

function prechargerScores() {
    fetch(SCRIPT_URL).then(res => res.json()).then(data => { if(data) topScoresLocaux = data; }).catch(() => {});
}

function spawnItem() {
    if (gameOver) return;
    let rand = Math.random();
    let itemType = "obstacle";
    
    if (rand > 0.75) {
        itemType = "booster";
    } else if (rand > 0.50) {
        itemType = "nuage";
    }

    // Calcul de la zone stricte de jeu pour éviter que les éléments apparaissent en dehors
    let size = itemType === "nuage" ? 110 : (itemType === "obstacle" ? 55 : 44);
    items.push({
        x: Math.random() * (canvas.width - size - 20) + 10,
        y: -120,
        width: size,
        height: itemType === "nuage" ? 55 : (itemType === "obstacle" ? 55 : 48),
        type: itemType,
        angle: Math.random() * Math.PI // Rotation initiale pour le réalisme
    });
    
    setTimeout(spawnItem, Math.max(300, 1200 - (gameSpeed * 45)));
}

// Générateur de particules lumineuses (Feu sous la fusée et explosions)
function ajouterParticule(x, y, couleur, taille, vy) {
    particules.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 2,
        vy: vy,
        alpha: 1,
        taille: taille,
        couleur: couleur
    });
}

function update() {
    if (gameOver) return;

    // Défilement fluide de votre arrière-plan d'origine
    fondY += gameSpeed * 0.55; 
    if (fondY >= canvas.height) fondY = 0;
    
    gameSpeed += 0.0022;
    document.getElementById("speedText").innerText = (gameSpeed / 4).toFixed(1) + "x";
    
    // --- SÉCURITÉ ANTI-TRICHE : Limites latérales strictes ---
    // La fusée ne peut JAMAIS sortir des dimensions visibles du cadre du jeu
    rocket.x += (rocket.targetX - rocket.x) * 0.22;
    if (rocket.x < 15) rocket.x = 15;
    if (rocket.x > canvas.width - rocket.width - 15) rocket.x = canvas.width - rocket.width - 15;

    // Diminution de l'effet d'impact
    if (screenShake > 0) screenShake -= 0.1;

    // Gestion de la traînée de feu pixel-art sous les tuyères
    if (Math.random() < 0.6) {
        ajouterParticule(rocket.x + rocket.width / 2 + (Math.random() * 10 - 5), rocket.y + rocket.height - 10, '#f59e0b', Math.random() * 5 + 3, Math.random() * 3 + 4);
        if (estInvincible) {
            ajouterParticule(rocket.x + rocket.width / 2 + (Math.random() * 10 - 5), rocket.y + rocket.height - 10, '#38bdf8', Math.random() * 6 + 4, Math.random() * 3 + 5);
        }
    }

    // Gestion du Mode Invincible
    if (estInvincible) {
        superJauge -= 0.4;
        if (superJauge <= 0) { estInvincible = false; }
    }
    document.getElementById("jauge-fill").style.height = superJauge + "%";

    // Gestion des particules
    for (let p = particules.length - 1; p >= 0; p--) {
        particules[p].x += particules[p].vx;
        particules[p].y += particules[p].vy;
        particules[p].alpha -= 0.02;
        if (particules[p].alpha <= 0) particules.splice(p, 1);
    }

    // Gestion des obstacles
    for (let i = items.length - 1; i >= 0; i--) {
        let it = items[i];
        it.y += itemSpeedModifier(it.type);
        it.angle += 0.01; // Fait tourner délicatement les météorites voxel

        // Ignorer les collisions avec les simples nuages décoratifs
        if (it.type === "nuage") {
            if (it.y > canvas.height) items.splice(i, 1);
            continue;
        }

        // Zone de collision ajustée (AABB stricte avec marges de sécurité)
        if (rocket.x + 8 < it.x + it.width &&
            rocket.x + rocket.width - 8 > it.x &&
            rocket.y + 10 < it.y + it.height &&
            rocket.y + rocket.height - 15 > it.y) {
            
            if (it.type === "booster") {
                score += 30;
                // Animation d'étincelles bleues lors de la collecte de batterie
                for(let k=0; k<12; k++) ajouterParticule(it.x + it.width/2, it.y + it.height/2, '#38bdf8', Math.random()*4+2, (Math.random()-0.5)*6);
                
                if (!estInvincible) {
                    superJauge = Math.min(100, superJauge + 20);
                    if (superJauge >= 100) { estInvincible = true; screenShake = 3; }
                }
                items.splice(i, 1);
            } else {
                if (!estInvincible) { 
                    screenShake = 6;
                    declencherGameOver(); 
                } else { 
                    score += 60; // Éclater un débris en mode invincible donne un super bonus !
                    screenShake = 3;
                    for(let k=0; k<15; k++) ajouterParticule(it.x + it.width/2, it.y + it.height/2, '#ef4444', Math.random()*5+2, (Math.random()-0.5)*5);
                    items.splice(i, 1); 
                }
            }
            document.getElementById("scoreText").innerText = score;
            continue;
        }

        if (it.y > canvas.height) { 
            items.splice(i, 1); 
            score += 2; 
            document.getElementById("scoreText").innerText = score; 
        }
    }
}

function itemSpeedModifier(type) {
    if (type === "nuage") return gameSpeed * 0.75; // Les nuages se déplacent un peu plus lentement pour donner l'effet de hauteur parallaxe
    return gameSpeed;
}

function draw() {
    ctx.save();
    
    // Effet d'impact (Secousse de l'écran)
    if (screenShake > 0) {
        let dx = (Math.random() - 0.5) * screenShake * 4;
        let dy = (Math.random() - 0.5) * screenShake * 4;
        ctx.translate(dx, dy);
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. Rendu IMPECCABLE de votre fond d'écran Minecraft (Zéro écran noir possible)
    try {
        ctx.drawImage(imgFond, 0, fondY, canvas.width, canvas.height);
        ctx.drawImage(imgFond, 0, fondY - canvas.height, canvas.width, canvas.height);
    } catch(e) {
        ctx.fillStyle = "#1b2c18"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // 2. Rendu des Particules (Feu et Énergie)
    particules.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.couleur;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.taille, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });

    // 3. Rendu des Obstacles, Nuages et Batteries de la maquette originale
    items.forEach(it => {
        ctx.save();
        if (it.type === "obstacle") {
            ctx.drawImage(imgMeteore, it.x, it.y, it.width, it.height);
        } else if (it.type === "booster") {
            ctx.drawImage(imgBatterie, it.x, it.y, it.width, it.height);
        } else if (it.type === "nuage") {
            ctx.globalAlpha = 0.85;
            ctx.drawImage(imgNuage, it.x, it.y, it.width, it.height);
        }
        ctx.restore();
    });

    // 4. Rendu de votre Fusée Mascotte (Proportions d'origine fixes, non écrasée)
    try {
        if (estInvincible) {
            ctx.save();
            ctx.shadowBlur = 25;
            ctx.shadowColor = "#fbbf24";
        }
        ctx.drawImage(imgFusee, rocket.x, rocket.y, rocket.width, rocket.height);
        if (estInvincible) ctx.restore();
    } catch(e) {
        ctx.font = "50px Arial"; ctx.fillText("🚀", rocket.x, rocket.y + 40);
    }

    ctx.restore();
}

function gameLoop() { update(); draw(); if (!gameOver) requestAnimationFrame(gameLoop); }

function declencherGameOver() {
    gameOver = true;
    document.getElementById("final-score-text").innerText = "Votre puissance finale : " + score + " ⚡";
    document.getElementById("game-over-screen").style.display = "flex";
    
    let pseudo = prompt("Entrez votre pseudo pour le classement du week-end :");
    if (!pseudo || pseudo.trim() === "") pseudo = "Pilote";

    topScoresLocaux.push({ pseudo: pseudo, score: score });
    topScoresLocaux.sort((a, b) => b.score - a.score);
    afficherLeTableau(pseudo, score);

    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pseudo: pseudo, score: score })
    });
}

function afficherLeTableau(monPseudo, monScore) {
    let html = "";
    topScoresLocaux.slice(0, 5).forEach((joueur, index) => {
        let style = joueur.pseudo === monPseudo && joueur.score === monScore ? 'style="color:#fbbf24; font-weight:bold;"' : '';
        html += `<div class="leaderboard-row" ${style}><span>${index+1}. ${joueur.pseudo}</span><span>${joueur.score} ⚡</span></div>`;
    });
    document.getElementById("leaderboard-content").innerHTML = html;
}

function recommencer() { document.location.reload(); }

// --- CONTROLES SECURISES ET BLOQUES CONTRE LA TRICHE ---
function piloter(clientX) {
    const rect = canvas.getBoundingClientRect();
    let echelle = canvas.width / rect.width;
    // Calcule la cible et la coince obligatoirement à l'intérieur de l'écran visible
    let bruteTarget = ((clientX - rect.left) * echelle) - rocket.width / 2;
    rocket.targetX = Math.max(10, Math.min(canvas.width - rocket.width - 10, bruteTarget));
}

window.addEventListener("mousemove", (e) => { piloter(e.clientX); });
window.addEventListener("touchmove", (e) => { 
    if(e.touches.length > 0) piloter(e.touches[0].clientX); 
}, { passive: false });
</script>
</body>
</html>
