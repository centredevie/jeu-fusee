<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montée en Puissance - Le Jeu</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            background: #0d1117;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 800px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            background: #0b0f19;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* HUD */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            padding: 15px;
        }
        .hud-box {
            position: absolute;
            background: rgba(16, 24, 48, 0.85);
            padding: 8px 12px;
            border-radius: 6px;
            border: 2px solid #3b82f6;
            font-weight: bold;
            font-size: 16px;
        }
        #score-box { top: 15px; left: 15px; }
        #speed-box { top: 55px; left: 15px; }

        #jauge-container {
            position: absolute;
            right: 15px;
            top: 100px;
            width: 30px;
            height: 250px;
            background: rgba(16, 24, 48, 0.85);
            border: 2px solid #f59e0b;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
        }
        #jauge-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #f59e0b, #ef4444);
            transition: height 0.2s ease;
        }
        #jauge-label {
            position: absolute;
            right: -52px;
            top: 195px;
            transform: rotate(-90deg);
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #f59e0b;
        }

        /* Écran Game Over */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
        .leaderboard {
            width: 100%;
            max-width: 300px;
            margin: 20px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 10px;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="score-box" class="hud-box">
            PUISSANCE: <span id="scoreText">0</span> ⚡
        </div>
        <div id="speed-box" class="hud-box">
            VITESSE: <span id="speedText">1.0x</span>
        </div>
        <div id="jauge-container">
            <div id="jauge-fill"></div>
            <div id="jauge-label">Montée en puissance</div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1 style="color: #ef4444; margin-bottom: 5px;">FIN DE TRANSMISSION</h1>
        <p id="final-score-text" style="font-size: 20px; margin-top: 5px;">Votre score : 0</p>
        <h3>🏆 TOP 5 DU WEEK-END</h3>
        <div class="leaderboard" id="leaderboard-content">
            <div class="leaderboard-row"><span>Chargement du classement...</span></div>
        </div>
        <button class="btn" onclick="recommencer()">REDECOLLER</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-14uN1svuWyiSZN3yDsLpXKxaJKCsuRNZAvlvGCAoSjp_7fFjROydAhcinzHJgw3M/exec"; 

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 450;
canvas.height = 800;

// --- CONFIGURATION DES CHEMINS D'IMAGES ---
const PATH_FOND = 'fond_decollage.png'; 
const PATH_FUSEE = 'fusee.png';
const PATH_METEORITE = 'meteorite.png';
const PATH_BOOSTER = 'booster.png';

const imgFond = new Image(); imgFond.src = PATH_FOND;
const imgFusee = new Image(); imgFusee.src = PATH_FUSEE;
const imgMeteorite = new Image(); imgMeteorite.src = PATH_METEORITE;
const imgBooster = new Image(); imgBooster.src = PATH_BOOSTER;

let fondPret = false;
let fuseePrete = false;
let meteoritePrete = false;
let boosterPret = false;

imgFond.onload = () => { fondPret = true; };
imgMeteorite.onload = () => { meteoritePrete = true; };
imgBooster.onload = () => { boosterPret = true; };

// --- CORRECTION TAILLE FUSÉE ---
// On réduit la largeur de base (ex: 60px) pour que la fusée de 234x646 px soit fine et élancée à l'écran
const rocketBaseW = 60; 

const rocket = {
    x: canvas.width / 2 - rocketBaseW / 2,
    y: canvas.height - 220,
    width: rocketBaseW,
    height: rocketBaseW * 2.76, 
    targetX: canvas.width / 2 - rocketBaseW / 2
};

imgFusee.onload = () => { 
    fuseePrete = true;
    const realRatio = imgFusee.naturalHeight / imgFusee.naturalWidth; // Vaut 646 / 234 ≈ 2.76
    rocket.width = rocketBaseW; 
    rocket.height = rocket.width * realRatio;
    rocket.y = canvas.height - rocket.height - 40;
};

// Variables globales de jeu
let score = 0;
let gameSpeed = 4;
let gameOver = false;

// Gestion du fond d'écran
let fondY = 0; 
let phaseBoucleCiel = false;

// Énergie
let energie = 100;
const energieMax = 100;
const drainParSeconde = 6;

let items = [];
let topScoresLocaux = [];

prechargerScores();
spawnItem();
gameLoop();

function prechargerScores() {
    fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => { 
            if(Array.isArray(data)) {
                topScoresLocaux = data;
                afficherLeTableau("", 0);
            }
        })
        .catch(() => {});
}

function spawnItem() {
    if (gameOver) return;

    let ratioObstacle = 0.8 - Math.min(0.3, (gameSpeed - 4) * 0.03);
    if (ratioObstacle < 0.4) ratioObstacle = 0.4;

    let typeChoisi = (Math.random() < ratioObstacle) ? "obstacle" : "booster";
    let itemWidth, itemHeight, speedFactor;

    if (typeChoisi === "obstacle") {
        const possibleScales = [0.10, 0.13, 0.16, 0.19, 0.22];
        const scale = possibleScales[Math.floor(Math.random() * possibleScales.length)];

        itemWidth = 435 * scale;
        itemHeight = 410 * scale;

        if (scale <= 0.12) speedFactor = 1.25;
        else if (scale >= 0.20) speedFactor = 0.85;
        else speedFactor = 1.0;

    } else {
        const scale = 0.24; 
        itemWidth = 500 * scale;
        itemHeight = 281 * scale;
        speedFactor = 1.0;
    }

    items.push({
        x: Math.random() * (canvas.width - itemWidth),
        y: -itemHeight,
        width: itemWidth,
        height: itemHeight,
        type: typeChoisi,
        speedFactor: speedFactor
    });

    setTimeout(spawnItem, Math.max(350, 1300 - (gameSpeed * 50)));
}

function update() {
    if (gameOver) return;

    if (fondPret) {
        let echelleFond = canvas.width / imgFond.naturalWidth;
        let hauteurTotaleAffichee = imgFond.naturalHeight * echelleFond;
        
        // La limite où le haut de l'écran touche enfin le haut du fichier image
        let limiteTransition = hauteurTotaleAffichee - canvas.height;

        if (!phaseBoucleCiel) {
            fondY += gameSpeed * 0.4;
            if (fondY >= limiteTransition) {
                phaseBoucleCiel = true;
                // On se verrouille précisément au début de la texture du ciel (tout en haut du fichier)
                fondY = limiteTransition; 
            }
        } else {
            // --- CORRECTION DE LA BOUCLE DU CIEL ---
            // On fait défiler uniquement le motif du ciel sur la hauteur d'un écran (canvas.height)
            fondY += gameSpeed * 0.4;
        }
    }

    gameSpeed += 0.002;
    document.getElementById("speedText").innerText = (gameSpeed / 4).toFixed(1) + "x";

    energie -= drainParSeconde * (1/60);
    if (energie < 0) energie = 0;
    document.getElementById("jauge-fill").style.height = energie + "%";

    if (energie === 0) {
        declencherGameOver();
        return;
    }

    rocket.x += (rocket.targetX - rocket.x) * 0.2;

    for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.y += gameSpeed * (item.speedFactor || 1);

        const hitboxScaleRocket = 0.7;
        const hitboxScaleItem = 0.7;

        const rx = rocket.x + rocket.width * (1 - hitboxScaleRocket) / 2;
        const ry = rocket.y + rocket.height * (1 - hitboxScaleRocket) / 2;
        const rw = rocket.width * hitboxScaleRocket;
        const rh = rocket.height * hitboxScaleRocket;

        const ix = item.x + item.width * (1 - hitboxScaleItem) / 2;
        const iy = item.y + item.height * (1 - hitboxScaleItem) / 2;
        const iw = item.width * hitboxScaleItem;
        const ih = item.height * hitboxScaleItem;

        if (rx < ix + iw && rx + rw > ix && ry < iy + ih && ry + rh > iy) {
            if (item.type === "booster") {
                score += 25;
                energie = Math.min(energieMax, energie + 25);
            } else {
                declencherGameOver();
                return;
            }

            items.splice(i, 1);
            document.getElementById("scoreText").innerText = score;
            continue;
        }

        if (item.y > canvas.height) {
            items.splice(i, 1);
            score += 1;
            document.getElementById("scoreText").innerText = score;
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (fondPret) {
        let echelleFond = canvas.width / imgFond.naturalWidth;

        if (!phaseBoucleCiel) {
