<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montée en Puissance - Le Jeu</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            background: #0d1117;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 800px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            background: #0b0f19;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* HUD */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            padding: 15px;
        }
        .hud-box {
            position: absolute;
            background: rgba(16, 24, 48, 0.85);
            padding: 8px 12px;
            border-radius: 6px;
            border: 2px solid #3b82f6;
            font-weight: bold;
            font-size: 16px;
        }
        #score-box { top: 15px; left: 15px; }
        #speed-box { top: 55px; left: 15px; }

        #jauge-container {
            position: absolute;
            right: 15px;
            top: 100px;
            width: 30px;
            height: 250px;
            background: rgba(16, 24, 48, 0.85);
            border: 2px solid #f59e0b;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
        }
        #jauge-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #f59e0b, #ef4444);
            transition: height 0.2s ease;
        }
        #jauge-label {
            position: absolute;
            right: -45px;
            top: 210px;
            transform: rotate(-90deg);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #f59e0b;
        }

        /* Écran Game Over */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
        .leaderboard {
            width: 100%;
            max-width: 300px;
            margin: 20px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 10px;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="score-box" class="hud-box">
            PUISSANCE: <span id="scoreText">0</span> ⚡
        </div>
        <div id="speed-box" class="hud-box">
            VITESSE: <span id="speedText">1.0x</span>
        </div>
        <div id="jauge-container">
            <div id="jauge-fill"></div>
            <div id="jauge-label">Montée en puissance</div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1 style="color: #ef4444; margin-bottom: 5px;">FIN DE TRANSMISSION</h1>
        <p id="final-score-text" style="font-size: 20px; margin-top: 5px;">Votre score : 0</p>
        <h3>🏆 TOP 5 DU WEEK-END</h3>
        <div class="leaderboard" id="leaderboard-content">
            <div class="leaderboard-row">
                <span>Chargement du classement...</span>
            </div>
        </div>
        <button class="btn" onclick="recommencer()">REDECOLLER</button>
    </div>
</div>

<script>
// URL du script Apps Script (classement)
const SCRIPT_URL = "[script.google.com](https://script.google.com/macros/s/AKfycbz-14uN1svuWyiSZN3yDsLpXKxaJKCsuRNZAvlvGCAoSjp_7fFjROydAhcinzHJgw3M/exec)";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 450;
canvas.height = 800;

// --- IMAGES ---
// Fond principal
const imgFond = new Image();
imgFond.src = "fond.png";
let fondPret = false;
imgFond.onload = () => { fondPret = true; };

// Fusée mascotte (500x281)
const imgFusee = new Image();
imgFusee.src = "fusee.png";
let fuseePrete = false;
imgFusee.onload = () => { fuseePrete = true; };

// Météorite (435x410)
const imgMeteorite = new Image();
imgMeteorite.src = "meteorite.png";
let meteoritePrete = false;
imgMeteorite.onload = () => { meteoritePrete = true; };

// Booster / batterie (500x281)
const imgBooster = new Image();
imgBooster.src = "booster.png";
let boosterPret = false;
imgBooster.onload = () => { boosterPret = true; };

// --- VARIABLES DE JEU ---
let score = 0;
let gameSpeed = 4;          // vitesse de chute des objets
let gameOver = false;

// ÉNERGIE (jauge)
let energie = 100;
const energieMax = 100;
const drainParSeconde = 6;  // à ajuster pour le rythme

// Fusée : taille cohérente et moins allongée
const rocketImgW = 500;
const rocketImgH = 281;

// largeur à l'écran (ajustable)
const rocketBaseW = 90;
// ratio "visuel" souhaité : fusée plus haute que large mais pas étirée
const targetRatio = 1.4;           // hauteur ≈ 1.4 * largeur
const rocketBaseH = rocketBaseW * targetRatio;

const rocket = {
    x: canvas.width / 2 - rocketBaseW / 2,
    y: canvas.height - 220,
    width: rocketBaseW,
    height: rocketBaseH,
    targetX: canvas.width / 2 - rocketBaseW / 2
};

let items = [];             // obstacles + boosters
let topScoresLocaux = [];   // rempli depuis Google Apps Script
let scoresCharges = false;  // évite d'afficher un tableau vide trop tôt

// --- INIT ---
prechargerScores();
spawnItem();
gameLoop();

// --- SCORES ---
function normaliserScores(data) {
    return data
        .filter(e => e && typeof e.pseudo === "string" && typeof e.score === "number")
        .sort((a, b) => b.score - a.score);
}

function prechargerScores() {
    fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            if (Array.isArray(data)) {
                topScoresLocaux = normaliserScores(data);
                scoresCharges = true;
                afficherLeTableau("", 0);
            }
        })
        .catch(() => {});
}

// --- SPAWN DES OBJETS ---
function spawnItem() {
    if (gameOver) return;

    let ratioObstacle = 0.65 + (gameSpeed * 0.01);
    let typeChoisi = (Math.random() < ratioObstacle) ? "obstacle" : "booster";

    let itemWidth, itemHeight, speedFactor;

    if (typeChoisi === "obstacle") {
        // 5 tailles plus petites pour la météorite (435x410)
        const possibleScales = [0.10, 0.13, 0.16, 0.19, 0.22];
        const scale = possibleScales[Math.floor(Math.random() * possibleScales.length)];

        itemWidth = 435 * scale;
        itemHeight = 410 * scale;

        // petites plus rapides, grosses un peu plus lentes
        if (scale <= 0.12) speedFactor = 1.25;
        else if (scale >= 0.20) speedFactor = 0.85;
        else speedFactor = 1.0;

    } else { // booster
        // 500x281, capsule assez compacte
        const scale = 0.24; // ~120x67px
        itemWidth = 500 * scale;
        itemHeight = 281 * scale;
        speedFactor = 1.0;
    }

    items.push({
        x: Math.random() * (canvas.width - itemWidth),
        y: -itemHeight,
        width: itemWidth,
        height: itemHeight,
        type: typeChoisi,
        speedFactor: speedFactor
    });

    const delai = Math.max(350, 1300 - (gameSpeed * 50));
    setTimeout(spawnItem, delai);
}

// --- UPDATE ---
function update() {
    if (gameOver) return;

    // Augmentation progressive de la vitesse
    gameSpeed += 0.002;
    document.getElementById("speedText").innerText = (gameSpeed / 4).toFixed(1) + "x";

    // Énergie : baisse constante
    energie -= drainParSeconde * (1 / 60);   // approx 60 FPS
    if (energie < 0) energie = 0;
    document.getElementById("jauge-fill").style.height = energie + "%";

    // Si plus d'énergie -> game over (panne)
    if (energie === 0) {
        declencherGameOver();
        return;
    }

    // Déplacement fluide de la fusée vers sa targetX
    rocket.x += (rocket.targetX - rocket.x) * 0.2;

    // Mise à jour des items
    for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];

        // déplacement vertical : gameSpeed * speedFactor
        item.y += gameSpeed * (item.speedFactor || 1);

        // --- COLLISIONS avec hitbox réduites ---
        const hitboxScaleRocket = 0.7;
        const hitboxScaleItem = 0.7;

        const rx = rocket.x + rocket.width * (1 - hitboxScaleRocket) / 2;
        const ry = rocket.y + rocket.height * (1 - hitboxScaleRocket) / 2;
        const rw = rocket.width * hitboxScaleRocket;
        const rh = rocket.height * hitboxScaleRocket;

        const ix = item.x + item.width * (1 - hitboxScaleItem) / 2;
        const iy = item.y + item.height * (1 - hitboxScaleItem) / 2;
        const iw = item.width * hitboxScaleItem;
        const ih = item.height * hitboxScaleItem;

        if (rx < ix + iw &&
            rx + rw > ix &&
            ry < iy + ih &&
            ry + rh > iy) {

            if (item.type === "booster") {
                // Capsule d'énergie : augmente énergie
                score += 25;
                energie = Math.min(energieMax, energie + 25);
            } else {
                // Météorite : crash direct
                declencherGameOver();
                return;
            }

            items.splice(i, 1);
            document.getElementById("scoreText").innerText = score;
            continue;
        }

        // Sortie de l'écran par le bas
        if (item.y > canvas.height) {
            items.splice(i, 1);
            // petit bonus de survie
            score += 1;
            document.getElementById("scoreText").innerText = score;
        }
    }
}

// --- DRAW ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Fond (fixe)
    if (fondPret) {
        ctx.drawImage(imgFond, 0, 0, canvas.width, canvas.height);
    } else {
        // fond de secours
        ctx.fillStyle = "#111827";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        for (let i = 0; i < 20; i++) {
            ctx.fillRect((i * 37) % canvas.width, (i * 93) % canvas.height, 2, 2);
        }
    }

    // 2. Items (météorites + boosters)
    items.forEach(item => {
        if (item.type === "obstacle") {
            if (meteoritePrete) {
                ctx.drawImage(
                    imgMeteorite,
                    item.x,
                    item.y,
                    item.width,
                    item.height
                );
            } else {
                // fallback emoji
                ctx.font = "40px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "top";
                ctx.fillText("☄️", item.x + item.width / 2, item.y);
            }
        } else { // booster
            if (boosterPret) {
                ctx.drawImage(
                    imgBooster,
                    item.x,
                    item.y,
                    item.width,
                    item.height
                );
            } else {
                // fallback emoji
                ctx.font = "36px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "top";
                ctx.fillText("🔋", item.x + item.width / 2, item.y);
            }
        }
    });

    // 3. Fusée
    if (fuseePrete) {
        ctx.drawImage(imgFusee, rocket.x, rocket.y, rocket.width, rocket.height);
    } else {
        ctx.font = "55px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText("🚀", rocket.x + rocket.width / 2, rocket.y);
    }
}

// --- BOUCLE PRINCIPALE ---
function gameLoop() {
    update();
    draw();
    if (!gameOver) requestAnimationFrame(gameLoop);
}

// --- GAME OVER / SCORES ---
function declencherGameOver() {
    if (gameOver) return;
    gameOver = true;

    document.getElementById("final-score-text").innerText =
        "Votre puissance finale : " + score + " ⚡";
    document.getElementById("game-over-screen").style.display = "flex";

    let pseudo = prompt("Entrez votre pseudo pour le classement du week-end :");
    if (!pseudo || pseudo.trim() === "") pseudo = "Anonyme";

    // on ajoute le score localement, en plus de ceux déjà chargés
    topScoresLocaux.push({ pseudo: pseudo, score: score });
    topScoresLocaux = normaliserScores(topScoresLocaux);

    afficherLeTableau(pseudo, score);

    // Envoi au script (mode no-cors : pas de réponse exploitable côté JS)
    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pseudo: pseudo, score: score })
    }).catch(() => {});

    // On tente de recharger le classement complet après quelques secondes
    setTimeout(recupererScoresSeuls, 4000);
}

function afficherLeTableau(monPseudo, monScore) {
    // Si on n'a encore jamais réussi à charger les scores
    if (!scoresCharges && topScoresLocaux.length === 0) {
        document.getElementById("leaderboard-content").innerHTML =
            '<div class="leaderboard-row"><span>Chargement du classement...</span></div>';
        return;
    }

    let html = "";
    if (topScoresLocaux.length === 0) {
        html = '<div class="leaderboard-row"><span>Aucun score. Soyez le premier !</span></div>';
    } else {
        topScoresLocaux.slice(0, 5).forEach((joueur, index) => {
            const estMoi = (joueur.pseudo === monPseudo && joueur.score === monScore);
            const style = estMoi ? 'style="color:#f59e0b; font-weight:bold;"' : "";
            html += `<div class="leaderboard-row" ${style}>
                        <span>${index + 1}. ${joueur.pseudo}</span>
                        <span>${joueur.score} ⚡</span>
                     </div>`;
        });
    }
    document.getElementById("leaderboard-content").innerHTML = html;
}

function recupererScoresSeuls() {
    fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            if (Array.isArray(data) && data.length > 0) {
                topScoresLocaux = normaliserScores(data);
                scoresCharges = true;
                afficherLeTableau("", 0);
            }
        })
        .catch(() => {});
}

function recommencer() {
    document.location.reload();
}

// --- CONTROLES (souris + tactile) ---
function piloter(clientX) {
    const rect = canvas.getBoundingClientRect();
    const echelle = canvas.width / rect.width;
    rocket.targetX = Math.max(
        0,
        Math.min(
            canvas.width - rocket.width,
            (clientX - rect.left) * echelle - rocket.width / 2
        )
    );
}

window.addEventListener("mousemove", (e) => {
    piloter(e.clientX);
});

window.addEventListener("touchmove", (e) => {
    if (e.touches.length > 0) piloter(e.touches[0].clientX);
}, { passive: false });

</script>
</body>
</html>
