<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montée en Puissance - Le Jeu</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            background: #0d1117;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 800px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            background: #0b0f19;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* HUD */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            padding: 15px;
        }
        .hud-box {
            position: absolute;
            background: rgba(16, 24, 48, 0.85);
            padding: 8px 12px;
            border-radius: 6px;
            border: 2px solid #3b82f6;
            font-weight: bold;
            font-size: 16px;
        }
        #score-box { top: 15px; left: 15px; }
        #speed-box { top: 55px; left: 15px; }

        #jauge-container {
            position: absolute;
            right: 15px;
            top: 100px;
            width: 30px;
            height: 250px;
            background: rgba(16, 24, 48, 0.85);
            border: 2px solid #f59e0b;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
        }
        #jauge-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #f59e0b, #ef4444);
            transition: height 0.2s ease;
        }
        #jauge-label {
            position: absolute;
            right: -52px;
            top: 195px;
            transform: rotate(-90deg);
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #f59e0b;
        }

        /* Écran Game Over */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
        .leaderboard {
            width: 100%;
            max-width: 300px;
            margin: 20px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 10px;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="score-box" class="hud-box">
            PUISSANCE: <span id="scoreText">0</span> ⚡
        </div>
        <div id="speed-box" class="hud-box">
            VITESSE: <span id="speedText">1.0x</span>
        </div>
        <div id="jauge-container">
            <div id="jauge-fill"></div>
            <div id="jauge-label">Montée en puissance</div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1 style="color: #ef4444; margin-bottom: 5px;">FIN DE TRANSMISSION</h1>
        <p id="final-score-text" style="font-size: 20px; margin-top: 5px;">Votre score : 0</p>
        <h3>🏆 TOP 5 DU WEEK-END</h3>
        <div class="leaderboard" id="leaderboard-content">
            <div class="leaderboard-row"><span>Chargement du classement...</span></div>
        </div>
        <button class="btn" onclick="recommencer()">REDECOLLER</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-14uN1svuWyiSZN3yDsLpXKxaJKCsuRNZAvlvGCAoSjp_7fFjROydAhcinzHJgw3M/exec"; 

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 450;
canvas.height = 800;

// --- CONFIGURATION DES CHEMINS D'IMAGES ---
const PATH_FOND = 'fond_decollage.png'; 
const PATH_FUSEE = 'fusee.png';
const PATH_METEORITE = 'meteorite.png';
const PATH_BOOSTER = 'booster.png';

const imgFond = new Image(); imgFond.src = PATH_FOND;
const imgFusee = new Image(); imgFusee.src = PATH_FUSEE;
const imgMeteorite = new Image(); imgMeteorite.src = PATH_METEORITE;
const imgBooster = new Image(); imgBooster.src = PATH_BOOSTER;

let fondPret = false;
let fuseePrete = false;
let meteoritePrete = false;
let boosterPret = false;

imgFond.onload = () => { fondPret = true; };
imgMeteorite.onload = () => { meteoritePrete = true; };
imgBooster.onload = () => { boosterPret = true; };

// --- CONFIGURATION FORMAT FUSÉE ---
const rocketBaseW = 60; 

const rocket = {
    x: canvas.width / 2 - rocketBaseW / 2,
    y: canvas.height - 220,
    width: rocketBaseW,
    height: rocketBaseW * 2.76, 
    targetX: canvas.width / 2 - rocketBaseW / 2
};

imgFusee.onload = () => { 
    fuseePrete = true;
    const realRatio = imgFusee.naturalHeight / imgFusee.naturalWidth;
    rocket.width = rocketBaseW; 
    rocket.height = rocket.width * realRatio;
    rocket.y = canvas.height - rocket.height - 40;
};

// Variables globales de jeu
let score = 0;
let gameSpeed = 4;
let gameOver = false;

// Variables de défilement (Version stable d'origine)
let fondY = 0;

// Énergie
let energie = 100;
const energieMax = 100;
const drainParSeconde = 6;

let items = [];
let topScoresLocaux = [];

prechargerScores();
spawnItem();
gameLoop();

function prechargerScores() {
    fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => { 
            if(Array.isArray(data)) {
                topScoresLocaux = data;
                afficherLeTableau("", 0);
            }
        })
        .catch(() => {});
}

function spawnItem() {
    if (gameOver) return;

    let ratioObstacle = 0.8 - Math.min(0.3, (gameSpeed - 4) * 0.03);
    if (ratioObstacle < 0.4) ratioObstacle = 0.4;

    let typeChoisi = (Math.random() < ratioObstacle) ? "obstacle" : "booster";
    let itemWidth, itemHeight, speedFactor;

    if (typeChoisi === "obstacle") {
        const possibleScales = [0.10, 0.13, 0.16, 0.19, 0.22];
        const scale = possibleScales[Math.floor(Math.random() * possibleScales.length)];

        itemWidth = 435 * scale;
        itemHeight = 410 * scale;

        if (scale <= 0.12) speedFactor = 1.25;
        else if (scale >= 0.20) speedFactor = 0.85;
        else speedFactor = 1.0;

    } else {
        const scale = 0.24; 
        itemWidth = 500 * scale;
        itemHeight = 281 * scale;
        speedFactor = 1.0;
    }

    items.push({
        x: Math.random() * (canvas.width - itemWidth),
        y: -itemHeight,
        width: itemWidth,
        height: itemHeight,
        type: typeChoisi,
        speedFactor: speedFactor
    });

    setTimeout(spawnItem, Math.max(350, 1300 - (gameSpeed * 50)));
}

function update() {
    if (gameOver) return;

    // --- LOGIQUE DE DÉFILEMENT SIMPLE ET SÉCURISÉE ---
    if (fondPret && imgFond.naturalHeight > 0) {
        let echelleFond = canvas.width / imgFond.naturalWidth;
        let hauteurTotaleAffichee = imgFond.naturalHeight * echelleFond;
        let limiteTransition = hauteurTotaleAffichee - canvas.height;

        // On monte dans l'image tant qu'on n'a pas atteint le sommet (le ciel bleu foncé)
        if (fondY < limiteTransition) {
            fondY += gameSpeed * 0.4;
        } else {
            // Une fois en haut, on se fige définitivement sur le bleu uni supérieur
            fondY = limiteTransition;
        }
    }

    gameSpeed += 0.002;
    document.getElementById("speedText").innerText = (gameSpeed / 4).toFixed(1) + "x";

    energie -= drainParSeconde * (1/60);
    if (energie < 0) energie = 0;
    document.getElementById("jauge-fill").style.height = energie + "%";

    if (energie === 0) {
        declencherGameOver();
        return;
    }

    rocket.x += (rocket.targetX - rocket.x) * 0.2;

    for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.y += gameSpeed * (item.speedFactor || 1);

        const hitboxScaleRocket = 0.7;
        const hitboxScaleItem = 0.7;

        const rx = rocket.x + rocket.width * (1 - hitboxScaleRocket) / 2;
        const ry = rocket.y + rocket.height * (1 - hitboxScaleRocket) / 2;
        const rw = rocket.width * hitboxScaleRocket;
        const rh = rocket.height * hitboxScaleRocket;

        const ix = item.x + item.width * (1 - hitboxScaleItem) / 2;
        const iy = item.y + item.height * (1 - hitboxScaleItem) / 2;
        const iw = item.width * hitboxScaleItem;
        const ih = item.height * hitboxScaleItem;

        if (rx < ix + iw && rx + rw > ix && ry < iy + ih && ry + rh > iy) {
            if (item.type === "booster") {
                score += 25;
                energie = Math.min(energieMax, energie + 25);
            } else {
                declencherGameOver();
                return;
            }

            items.splice(i, 1);
            document.getElementById("scoreText").innerText = score;
            continue;
        }

        if (item.y > canvas.height) {
            items.splice(i, 1);
            score += 1;
            document.getElementById("scoreText").innerText = score;
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // --- RENDU DU FOND D'ORIGINE STABLE ---
    if (fondPret && imgFond.naturalHeight > 0) {
        let echelleFond = canvas.width / imgFond.naturalWidth;
        
        // On calcule la portion de l'image de bas en haut
        let sourceY = imgFond.naturalHeight - (canvas.height / echelleFond) - (fondY / echelleFond);
        
        ctx.drawImage(imgFond, 0, Math.max(0, sourceY), imgFond.naturalWidth, canvas.height / echelleFond, 0, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = "#0b0f19";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Items
    items.forEach(item => {
        if (item.type === "obstacle") {
            if (meteoritePrete) {
                ctx.drawImage(imgMeteorite, item.x, item.y, item.width, item.height);
            } else {
                ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "top";
                ctx.fillText("☄️", item.x + item.width / 2, item.y);
            }
        } else {
            if (boosterPret) {
                ctx.drawImage(imgBooster, item.x, item.y, item.width, item.height);
            } else {
                ctx.font = "36px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "top";
                ctx.fillText("🔋", item.x + item.width / 2, item.y);
            }
        }
    });

    // Fusée
    if (fuseePrete) {
        ctx.drawImage(imgFusee, rocket.x, rocket.y, rocket.width, rocket.height);
    } else {
        ctx.font = "55px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText("🚀", rocket.x + rocket.width / 2, rocket.y);
    }
}

function gameLoop() {
    update();
    draw();
    if (!gameOver) requestAnimationFrame(gameLoop);
}

function declencherGameOver() {
    gameOver = true;
    document.getElementById("final-score-text").innerText = "Votre puissance finale : " + score + " ⚡";
    document.getElementById("game-over-screen").style.display = "flex";
    
    let pseudo = prompt("Entrez votre pseudo pour le classement du week-end :");
    if (!pseudo || pseudo.trim() === "") pseudo = "Anonyme";

    topScoresLocaux.push({ pseudo: pseudo, score: score });
    topScoresLocaux.sort((a, b) => b.score - a.score);
    
    afficherLeTableau(pseudo, score);

    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pseudo: pseudo, score: score })
    })
    .then(() => { setTimeout(recupererScoresSeuls, 1000); })
    .catch(() => {});
}

function afficherLeTableau(monPseudo, monScore) {
    let html = "";
    if(topScoresLocaux.length === 0) {
        html = '<div class="leaderboard-row"><span>Aucun score. Soyez le premier !</span></div>';
    } else {
        topScoresLocaux.slice(0, 5).forEach((joueur, index) => {
            let style = joueur.pseudo === monPseudo && joueur.score === monScore ? 'style="color:#f59e0b; font-weight:bold;"' : '';
            html += `<div class="leaderboard-row" ${style}><span>${index+1}. ${joueur.pseudo}</span><span>${joueur.score} ⚡</span></div>`;
        });
    }
    document.getElementById("leaderboard-content").innerHTML = html;
}

function recupererScoresSeuls() {
    fetch(SCRIPT_URL)
    .then(res => res.json())
    .then(data => { 
        if(data && data.length > 0) { 
            topScoresLocaux = data;
            topScoresLocaux.sort((a, b) => b.score - a.score);
            afficherLeTableau("", 0); 
        } 
    })
    .catch(() => {});
}

function recommencer() { document.location.reload(); }

function piloter(clientX) {
    const rect = canvas.getBoundingClientRect();
    let echelle = canvas.width / rect.width;
    rocket.targetX = Math.max(0, Math.min(canvas.width - rocket.width, ((clientX - rect.left) * echelle) - rocket.width / 2));
}
window.addEventListener("mousemove", (e) => { piloter(e.clientX); });
window.addEventListener("touchmove", (e) => { 
    if(e.touches.length > 0) piloter(e.touches[0].clientX); 
}, { passive: false });
</script>
</body>
</html>
