<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montée en Puissance</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body {
            background: #000;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%; max-width: 450px;
            height: 100vh; max-height: 850px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            overflow: hidden;
            /* Correction 1 : Fond uni bleu foncé pour une boucle de ciel invisible */
            background: #0a0f1e;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* HUD Styles */
        #ui-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; padding: 15px; z-index: 5; }
        .hud-box { position: absolute; background: rgba(14, 23, 41, 0.7); padding: 8px 12px; border-radius: 6px; border: 2px solid #38bdf8; font-weight: bold; font-size: 14px; color: white; backdrop-filter: blur(2px); }
        #score-box { top: 15px; left: 15px; }
        #speed-box { top: 55px; left: 15px; }
        #jauge-container { position: absolute; right: 15px; top: 15px; width: 22px; height: 180px; background: rgba(14, 23, 41, 0.7); border: 2px solid #f59e0b; border-radius: 11px; overflow: hidden; display: flex; flex-direction: column-reverse; }
        #jauge-fill { width: 100%; height: 0%; background: linear-gradient(to top, #fbbf24, #ef4444); transition: height 0.1s linear; }

        /* Écran Game Over */
        #game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(8, 12, 24, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; padding: 25px; text-align: center; z-index: 10; }
        .btn { background: #2563eb; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="score-box" class="hud-box">PUISSANCE: <span id="scoreText">0</span> ⚡</div>
            <div id="speed-box" class="hud-box">VITESSE: <span id="speedText">1.0x</span></div>
            <div id="jauge-container"><div id="jauge-fill"></div></div>
        </div>
        <div id="game-over-screen">
            <h1 style="color: #ef4444; margin-bottom: 10px;">FIN DE TRANSMISSION</h1>
            <p id="final-score-text" style="font-size: 18px; color: #fbbf24; font-weight: bold;">Votre puissance finale : 0 ⚡</p>
            <button class="btn" onclick="recommencer()">RECOLLER AU DÉCOLLAGE</button>
        </div>
    </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-14uN1svuWyiSZN3yDsLpXKxaJKCsuRNZAvlvGCAoSjp_7fFjROydAhcinzHJgw3M/exec";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 450; canvas.height = 800;

let score = 0; let gameSpeed = 5; let gameOver = false;
let fondY1 = 0; let fondY2 = -canvas.height;
let superJauge = 0; let estInvincible = false;
let items = [];

// --- Correction 2 : Calibration précise pour la fusée élancée (234x646) ---
// Nous gardons la largeur pour le gameplay, mais réduisons la hauteur affichée
// pour qu'elle corresponde au ratio réel sans paraître écrasée.
const targetWidth = 50; // Largeur pour la collision
const realRatio = 646 / 234; // Ratio hauteur/largeur d'origine

const rocket = {
    x: canvas.width / 2 - targetWidth / 2,
    y: 650,
    width: targetWidth,
    height: targetWidth * realRatio, // Hauteur calculée proportionnellement (approx 138px)
    targetX: canvas.width / 2 - targetWidth / 2
};

function spawnItem() {
    if (gameOver) return;
    let type = Math.random() < 0.75 ? "obstacle" : "booster";
    let size = type === "obstacle" ? 40 : 30;
    items.push({
        x: Math.random() * (canvas.width - size),
        y: -size,
        width: size,
        height: size,
        type: type,
        couleur: type === "obstacle" ? '#5a5d64' : '#fbbf24'
    });
    // Apparition plus rapide quand la vitesse augmente
    setTimeout(spawnItem, Math.max(250, 1000 - gameSpeed * 50));
}

function update() {
    if (gameOver) return;
    
    // Défilement infini du ciel uni
    fondY1 += gameSpeed * 0.5; fondY2 += gameSpeed * 0.5;
    if (fondY1 >= canvas.height) fondY1 = -canvas.height;
    if (fondY2 >= canvas.height) fondY2 = -canvas.height;
    
    // Accélération progressive
    gameSpeed += 0.003;
    document.getElementById("speedText").innerText = (gameSpeed / 5).toFixed(1) + "x";
    
    // Déplacement fluide fusée
    rocket.x += (rocket.targetX - rocket.x) * 0.15;
    
    // Gestion Mode Invincible (décroissance jauge)
    if (estInvincible) {
        superJauge -= 0.5;
        if (superJauge <= 0) { superJauge = 0; estInvincible = false; }
    }
    document.getElementById("jauge-fill").style.height = superJauge + "%";

    // Items
    for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        item.y += gameSpeed;
        
        // Collision simple (AABB)
        if (rocket.x < item.x + item.width &&
            rocket.x + rocket.width > item.x &&
            rocket.y < item.y + item.height &&
            rocket.y + rocket.height > item.y) {
            
            if (item.type === "booster") {
                score += 50;
                if (!estInvincible) {
                    superJauge = Math.min(100, superJauge + 25);
                    if (superJauge >= 100) estInvincible = true;
                }
            } else {
                if (!estInvincible) declencherGameOver();
            }
            items.splice(i, 1);
            document.getElementById("scoreText").innerText = score;
            continue;
        }
        
        // Sortie écran
        if (item.y > canvas.height) {
            items.splice(i, 1);
            score += 5;
            document.getElementById("scoreText").innerText = score;
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. Fond Ciel (Correction 1 : Bleu foncé uni appliqué ici)
    ctx.fillStyle = '#0a0f1e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 2. Étoiles lointaines (pour la sensation de vitesse)
    ctx.fillStyle = '#FFF';
    for(let i=0; i<30; i++) {
        let yStar = (i * 50 + fondY1 * 2) % canvas.height;
        ctx.fillRect((i * 137) % canvas.width, yStar, 2, 2);
    }
    
    // 3. Items
    items.forEach(item => {
        ctx.fillStyle = item.couleur;
        ctx.beginPath();
        if(item.type === "obstacle") {
            ctx.moveTo(item.x + item.width/2, item.y);
            ctx.lineTo(item.x + item.width, item.y + item.height);
            ctx.lineTo(item.x, item.y + item.height);
        } else {
            ctx.arc(item.x + item.width/2, item.y + item.height/2, item.width/2, 0, Math.PI*2);
        }
        ctx.fill();
    });
    
    // 4. Fusée (Correction 2 : Dessinée avec les nouvelles proportions)
    if (estInvincible) { ctx.save(); ctx.shadowBlur = 20; ctx.shadowColor = '#fbbf24'; }
    
    // Corps
    ctx.fillStyle = '#e2e8f0'; ctx.fillRect(rocket.x, rocket.y, rocket.width, rocket.height);
    // Nez (plus élancé)
    ctx.fillStyle = '#ef4444';
    ctx.beginPath(); ctx.moveTo(rocket.x, rocket.y); ctx.lineTo(rocket.x + rocket.width/2, rocket.y - 25); ctx.lineTo(rocket.x + rocket.width, rocket.y); ctx.fill();
    // Ailerons
    ctx.fillStyle = '#ef4444'; ctx.fillRect(rocket.x - 10, rocket.y + rocket.height - 30, 10, 30); ctx.fillRect(rocket.x + rocket.width, rocket.y + rocket.height - 30, 10, 30);
    // Hublot
    ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.arc(rocket.x + rocket.width/2, rocket.y + 40, 10, 0, Math.PI*2); ctx.fill();
    // Flamme
    ctx.fillStyle = '#f97316'; ctx.beginPath(); ctx.moveTo(rocket.x + rocket.width/4, rocket.y + rocket.height); ctx.lineTo(rocket.x + rocket.width/2, rocket.y + rocket.height + 30 + Math.random()*10); ctx.lineTo(rocket.x + 3*rocket.width/4, rocket.y + rocket.height); ctx.fill();
    
    if (estInvincible) ctx.restore();
}

function gameLoop() { update(); draw(); if (!gameOver) requestAnimationFrame(gameLoop); }

function declencherGameOver() {
    gameOver = true;
    document.getElementById("final-score-text").innerText = "Votre puissance finale : " + score + " ⚡";
    document.getElementById("game-over-screen").style.display = "flex";
    
    let pseudo = prompt("Entrez votre pseudo pour le classement :");
    if (!pseudo || pseudo.trim() === "") pseudo = "Pilote Anonyme";
    fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ pseudo: pseudo, score: score }) });
}

function recommencer() { document.location.reload(); }

function piloter(clientX) {
    const rect = canvas.getBoundingClientRect();
    let scaleX = canvas.width / rect.width;
    rocket.targetX = (clientX - rect.left) * scaleX - rocket.width / 2;
    // Limites latérales
    if (rocket.targetX < 15) rocket.targetX = 15;
    if (rocket.targetX > canvas.width - rocket.width - 15) rocket.targetX = canvas.width - rocket.width - 15;
}
window.addEventListener("mousemove", (e) => piloter(e.clientX));
window.addEventListener("touchmove", (e) => { if (e.touches.length > 0) piloter(e.touches[0].clientX); });
spawnItem();
gameLoop();
</script>
</body>
</html>
