<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montée en Puissance - Le Jeu</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            background: #0d1117;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 800px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            background: #0b0f19;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* HUD */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            padding: 15px;
        }
        .hud-box {
            position: absolute;
            background: rgba(16, 24, 48, 0.85);
            padding: 8px 12px;
            border-radius: 6px;
            border: 2px solid #3b82f6;
            font-weight: bold;
            font-size: 16px;
        }
        #score-box { top: 15px; left: 15px; }
        #speed-box { top: 55px; left: 15px; }

        #jauge-container {
            position: absolute;
            right: 15px;
            top: 100px;
            width: 30px;
            height: 250px;
            background: rgba(16, 24, 48, 0.85);
            border: 2px solid #f59e0b;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
        }
        #jauge-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #f59e0b, #ef4444);
            transition: height 0.2s ease;
        }
        #jauge-label {
            position: absolute;
            right: -52px;
            top: 195px;
            transform: rotate(-90deg);
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #f59e0b;
        }

        /* Écran Game Over */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }
        .leaderboard {
            width: 100%;
            max-width: 300px;
            margin: 20px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 10px;
        }
        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="score-box" class="hud-box">
            PUISSANCE: <span id="scoreText">0</span> ⚡
        </div>
        <div id="speed-box" class="hud-box">
            VITESSE: <span id="speedText">1.0x</span>
        </div>
        <div id="jauge-container">
            <div id="jauge-fill"></div>
            <div id="jauge-label">Montée en puissance</div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1 style="color: #ef4444; margin-bottom: 5px;">FIN DE TRANSMISSION</h1>
        <p id="final-score-text" style="font-size: 20px; margin-top: 5px;">Votre score : 0</p>
        <h3>🏆 TOP 5 DU WEEK-END</h3>
        <div class="leaderboard" id="leaderboard-content">
            <div class="leaderboard-row"><span>Chargement du classement...</span></div>
        </div>
        <button class="btn" onclick="recommencer()">REDECOLLER</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-14uN1svuWyiSZN3yDsLpXKxaJKCsuRNZAvlvGCAoSjp_7fFjROydAhcinzHJgw3M/exec"; 

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 450;
canvas.height = 800;

// --- CONFIGURATION DES CHEMINS D'IMAGES ---
const PATH_FOND = 'fond_decollage.png'; 
const PATH_FUSEE = 'fusee.png';
const PATH_METEORITE = 'meteorite.png';
const PATH_BOOSTER = 'booster.png';
const PATH_SATELLITE = 'satellite.png';
const PATH_MISSILE = 'missile.png';

const imgFond = new Image(); imgFond.src = PATH_FOND;
const imgFusee = new Image(); imgFusee.src = PATH_FUSEE;
const imgMeteorite = new Image(); imgMeteorite.src = PATH_METEORITE;
const imgBooster = new Image(); imgBooster.src = PATH_BOOSTER;
const imgSatellite = new Image(); imgSatellite.src = PATH_SATELLITE;
const imgMissile = new Image(); imgMissile.src = PATH_MISSILE;

let fondPret = false;
let fuseePrete = false;
let meteoritePrete = false;
let boosterPret = false;
let satellitePret = false;
let missilePrete = false;

imgFond.onload = () => { fondPret = true; };
imgMeteorite.onload = () => { meteoritePrete = true; };
imgBooster.onload = () => { boosterPret = true; };
imgSatellite.onload = () => { satellitePret = true; };
imgMissile.onload = () => { missilePrete = true; };

// --- CONFIGURATION FORMAT FUSÉE ---
const rocketBaseW = 60; 

const rocket = {
    x: canvas.width / 2 - rocketBaseW / 2,
    y: canvas.height - 220,
    width: rocketBaseW,
    height: rocketBaseW * 2.76, 
    targetX: canvas.width / 2 - rocketBaseW / 2
};

imgFusee.onload = () => { 
    fuseePrete = true;
    const realRatio = imgFusee.naturalHeight / imgFusee.naturalWidth;
    rocket.width = rocketBaseW; 
    rocket.height = rocket.width * realRatio;
    rocket.y = canvas.height - rocket.height - 40;
};

// Variables globales de jeu
let score = 0;
let gameSpeed = 4; 
let timeElapsed = 0; 
let gameOver = false;

// Variables du défilement sectorisé
let cameraY = 0; 
let loopSpaceY = 0;
let atteintEspaceEnHaut = false;

// Énergie (Départ à 15%)
let energie = 15;
const energieMax = 100;
const drainParSeconde = 5.2; 

let items = [];
let topScoresLocaux = [];

prechargerScores();
spawnItem();
gameLoop();

function prechargerScores() {
    fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => { 
            if(Array.isArray(data)) {
                topScoresLocaux = data;
                afficherLeTableau("", 0);
            }
        })
        .catch(() => {});
}

function spawnItem() {
    if (gameOver) return;

    let multVisuel = gameSpeed / 4;
    
    let chanceBooster = 1.0; 
    if (multVisuel >= 1.5 && multVisuel < 2.5) {
        chanceBooster = 0.35; 
    } else if (multVisuel >= 2.5 && multVisuel < 3.2) {
        chanceBooster = 0.38;
    } else if (multVisuel >= 3.2) {
        chanceBooster = 0.45; 
    }

    let typeChoisi = (Math.random() < (1 - chanceBooster)) ? "obstacle" : "booster";
    
    if (multVisuel < 1.5) {
        typeChoisi = "booster";
    }

    let itemWidth, itemHeight, speedFactor;
    let vx = 0;
    let sousType = "meteorite";
    let estTraqueur = false;

    let xInitialProvisoire = Math.random() * (canvas.width - 100); 

    if (typeChoisi === "obstacle") {
        if (multVisuel >= 1.5 && multVisuel < 2.5) {
            sousType = "satellite";
        } 
        else if (multVisuel >= 2.5 && multVisuel < 3.2) {
            sousType = (Math.random() < 0.25) ? "satellite" : "meteorite";
        } 
        else {
            let de = Math.random();
            if (de < 0.40) {
                sousType = "missile";
            } else {
                sousType = "meteorite";
            }
        }

        if (sousType === "satellite") {
            const scaleSatellite = 0.26; 
            itemWidth = 530 * scaleSatellite; 
            itemHeight = 415 * scaleSatellite;
            speedFactor = 0.20; 
            vx = (Math.random() - 0.5) * 0.1; // Dérive latérale réduite pour éviter de coincer le joueur
        } else if (sousType === "missile") {
            speedFactor = 1.4; 
            const scaleMissile = 0.15;
            itemWidth = 170 * scaleMissile;
            itemHeight = 486 * scaleMissile;
            estTraqueur = true;
            
            let centreRocketX = rocket.x + rocket.width / 2;
            let centreItemX = xInitialProvisoire + itemWidth / 2;
            
            vx = (centreRocketX - centreItemX) * 0.025;
            vx = Math.max(-3.8, Math.min(3.8, vx)); 
        } else {
            sousType = "meteorite";
            const possibleScales = [0.11, 0.14, 0.17, 0.20];
            const scale = possibleScales[Math.floor(Math.random() * possibleScales.length)];
            itemWidth = 435 * scale;
            itemHeight = 410 * scale;
            speedFactor = (scale <= 0.14) ? 1.3 : 0.9;
            vx = (Math.random() - 0.5) * 2.2; 
        }
    } else {
        const scale = 0.24; 
        itemWidth = 500 * scale;
        itemHeight = 281 * scale;
        speedFactor = 1.0;
        vx = 0;
    }

    items.push({
        x: Math.max(0, Math.min(canvas.width - itemWidth, xInitialProvisoire)),
        y: -itemHeight,
        width: itemWidth,
        height: itemHeight,
        type: typeChoisi,
        sousType: sousType,
        speedFactor: speedFactor,
        vx: vx,
        traqueur: estTraqueur
    });

    // --- TIMING RECALIBRÉ ---
    let delaiDeBase = 1400;
    if (multVisuel < 1.5) {
        delaiDeBase = 1450;
    } else if (multVisuel >= 1.5 && multVisuel < 2.5) {
        // Donne beaucoup plus d'espace spécifiquement pour la phase de slalom des satellites
        delaiDeBase = 1750; 
    }
    
    let prochainSpawn = Math.max(450, delaiDeBase - (gameSpeed * 60));
    setTimeout(spawnItem, prochainSpawn);
}

function update() {
    if (gameOver) return;

    if (fondPret && imgFond.naturalHeight > 0) {
        let ratioAjustement = canvas.width / imgFond.naturalWidth;
        let hauteurImageSurEcran = imgFond.naturalHeight * ratioAjustement;
        let hauteurZoneBoucleSurEcran = canvas.height;

        let seuilEspaceAtteint = hauteurImageSurEcran - canvas.height;

        if (!atteintEspaceEnHaut) {
            cameraY += gameSpeed * 0.25;
            if (cameraY >= seuilEspaceAtteint) {
                atteintEspaceEnHaut = true;
                loopSpaceY = 0; 
            }
        } else {
            loopSpaceY += gameSpeed * 0.25;
            if (loopSpaceY >= hauteurZoneBoucleSurEcran) {
                loopSpaceY = loopSpaceY % hauteurZoneBoucleSurEcran;
            }
        }
    }

    timeElapsed += 1;
    gameSpeed = 4 + Math.log(1 + timeElapsed * 0.0012) * 5.5; 
    if (gameSpeed > 16) gameSpeed = 16; 

    document.getElementById("speedText").innerText = (gameSpeed / 4).toFixed(1) + "x";

    energie -= drainParSeconde * (1/60);
    if (energie < 0) energie = 0;
    document.getElementById("jauge-fill").style.height = energie + "%";

    if (energie === 0) {
        declencherGameOver();
        return;
    }

    rocket.x += (rocket.targetX - rocket.x) * 0.2;

    for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        
        item.y += gameSpeed * (item.speedFactor || 1);
        item.x += item.vx;

        if (item.x < 0 || item.x + item.width > canvas.width) {
            item.vx = -item.vx;
        }

        // Hitboxes ajustées : 0.55 pour le satellite pour laisser passer la fusée plus facilement
        const hitboxScaleRocket = 0.7;
        const hitboxScaleItem = item.sousType === "satellite" ? 0.55 : (item.sousType === "missile" ? 0.6 : 0.7);

        const rx = rocket.x + rocket.width * (1 - hitboxScaleRocket) / 2;
        const ry = rocket.y + rocket.height * (1 - hitboxScaleRocket) / 2;
        const rw = rocket.width * hitboxScaleRocket;
        const rh = rocket.height * hitboxScaleRocket;

        const ix = item.x + item.width * (1 - hitboxScaleItem) / 2;
        const iy = item.y + item.height * (1 - hitboxScaleItem) / 2;
        const iw = item.width * hitboxScaleItem;
        const ih = item.height * hitboxScaleItem;

        if (rx < ix + iw && rx + rw > ix && ry < iy + ih && ry + rh > iy) {
            if (item.type === "booster") {
                score += 15;
                energie = Math.min(energieMax, energie + 20); 
            } else {
                declencherGameOver();
                return;
            }

            items.splice(i, 1);
            document.getElementById("scoreText").innerText = score;
            continue;
        }

        if (item.y > canvas.height) {
            items.splice(i, 1);
            score += (item.type === "obstacle") ? 2 : 1;
            document.getElementById("scoreText").innerText = score;
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (fondPret && imgFond.naturalHeight > 0) {
        let ratioAjustement = canvas.width / imgFond.naturalWidth;
        let hauteurImageSurEcran = imgFond.naturalHeight * ratioAjustement;
        let hauteurZoneBoucleSurEcran = canvas.height;

        if (!atteintEspaceEnHaut) {
            let renduY = - (hauteurImageSurEcran - canvas.height) + cameraY;
            ctx.drawImage(imgFond, 0, renduY, canvas.width, hauteurImageSurEcran);
        } else {
            let y1 = loopSpaceY;
            let y2 = loopSpaceY - hauteurZoneBoucleSurEcran;

            let hauteurSourceEspace = imgFond.naturalWidth * (canvas.height / canvas.width);

            ctx.drawImage(
                imgFond, 
                0, 0, imgFond.naturalWidth, hauteurSourceEspace, 
                0, y1, canvas.width, hauteurZoneBoucleSurEcran
            );

            ctx.drawImage(
                imgFond, 
                0, 0, imgFond.naturalWidth, hauteurSourceEspace, 
                0, y2, canvas.width, hauteurZoneBoucleSurEcran
            );
        }
    } else {
        ctx.fillStyle = "#0b0f19";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    items.forEach(item => {
        if (item.type === "obstacle") {
            if (item.sousType === "satellite") {
                if (satellitePret) {
                    ctx.drawImage(imgSatellite, item.x, item.y, item.width, item.height);
                } else {
                    ctx.font = "55px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "top";
                    ctx.fillText("🛰️", item.x + item.width / 2, item.y);
                }
            } else if (item.sousType === "missile") { 
                if (missilePrete) {
                    ctx.save();
                    let centreX = item.x + item.width / 2;
                    let centreY = item.y + item.height / 2;
                    ctx.translate(centreX, centreY);
                    let vyReel = gameSpeed * (item.speedFactor || 1);
                    let angle = Math.atan2(item.vx, vyReel); 
                    ctx.rotate(-angle);
                    ctx.drawImage(imgMissile, -item.width / 2, -item.height / 2, item.width, item.height);
                    ctx.restore();
                } else {
                    ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "top";
                    ctx.fillText("🚨", item.x + item.width / 2, item.y);
                }
            } else {
                if (meteoritePrete) {
                    ctx.drawImage(imgMeteorite, item.x, item.y, item.width, item.height);
                } else {
                    ctx.font = "40px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "top";
                    ctx.fillText("☄️", item.x + item.width / 2, item.y);
                }
            }
        } else {
            if (boosterPret) {
                ctx.drawImage(imgBooster, item.x, item.y, item.width, item.height);
            } else {
                ctx.font = "36px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "top";
                ctx.fillText("🔋", item.x + item.width / 2, item.y);
            }
        }
    });

    if (fuseePrete) {
        ctx.drawImage(imgFusee, rocket.x, rocket.y, rocket.width, rocket.height);
    } else {
        ctx.font = "55px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText("🚀", rocket.x + rocket.width / 2, rocket.y);
    }
}

function gameLoop() {
    update();
    draw();
    if (!gameOver) requestAnimationFrame(gameLoop);
}

function declencherGameOver() {
    gameOver = true;
    document.getElementById("final-score-text").innerText = "Votre puissance finale : " + score + " ⚡";
    document.getElementById("game-over-screen").style.display = "flex";
    
    let pseudo = prompt("Entrez votre pseudo pour le classement du week-end :");
    if (!pseudo || pseudo.trim() === "") pseudo = "Anonyme";

    topScoresLocaux.push({ pseudo: pseudo, score: score });
    topScoresLocaux.sort((a, b) => b.score - a.score);
    
    afficherLeTableau(pseudo, score);

    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pseudo: pseudo, score: score })
    })
    .then(() => { setTimeout(recupererScoresSeuls, 1000); })
    .catch(() => {});
}

function afficherLeTableau(monPseudo, monScore) {
    let html = "";
    if(topScoresLocaux.length === 0) {
        html = '<div class="leaderboard-row"><span>Aucun score. Soyez le premier !</span></div>';
    } else {
        topScoresLocaux.slice(0, 5).forEach((joueur, index) => {
            let style = joueur.pseudo === monPseudo && joueur.score === monScore ? 'style="color:#f59e0b; font-weight:bold;"' : '';
            html += `<div class="leaderboard-row" ${style}><span>${index+1}. ${joueur.pseudo}</span><span>${joueur.score} ⚡</span></div>`;
        });
    }
    document.getElementById("leaderboard-content").innerHTML = html;
}

function recupererScoresSeuls() {
    fetch(SCRIPT_URL)
    .then(res => res.json())
    .then(data => { 
        if(data && data.length > 0) { 
            topScoresLocaux = data;
            topScoresLocaux.sort((a, b) => b.score - a.score);
            afficherLeTableau("", 0); 
        } 
    })
    .catch(() => {});
}

function recommencer() { document.location.reload(); }

function piloter(clientX) {
    const rect = canvas.getBoundingClientRect();
    let echelle = canvas.width / rect.width;
    rocket.targetX = Math.max(0, Math.min(canvas.width - rocket.width, ((clientX - rect.left) * echelle) - rocket.width / 2));
}
window.addEventListener("mousemove", (e) => { piloter(e.clientX); });
window.addEventListener("touchmove", (e) => { 
    if(e.touches.length > 0) piloter(e.touches[0].clientX); 
}, { passive: false });
</script>
</body>
</html>
