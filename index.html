<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montée en Puissance - Le Jeu</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            margin: 0;
            background: #0d1117;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 800px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            background: #1a2418;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* HUD Style Maquette */
        #ui-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; padding: 15px; }
        .hud-box { 
            position: absolute; 
            background: rgba(14, 23, 41, 0.9); 
            padding: 10px 14px; 
            border-radius: 6px; 
            border: 2px solid #38bdf8; 
            font-weight: bold; 
            font-size: 16px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #score-box { top: 15px; left: 15px; }
        #speed-box { top: 60px; left: 15px; }
        
        /* Super Jauge latérale droite */
        #jauge-container { 
            position: absolute; 
            right: 15px; 
            top: 100px; 
            width: 26px; 
            height: 280px; 
            background: rgba(14, 23, 41, 0.9); 
            border: 2px solid #f59e0b; 
            border-radius: 13px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column-reverse;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #jauge-fill { 
            width: 100%; 
            height: 0%; 
            background: linear-gradient(to top, #fbbf24, #f97316, #ef4444); 
            transition: height 0.15s ease; 
        }
        #jauge-label { 
            position: absolute; 
            right: -52px; 
            top: 230px; 
            transform: rotate(-90deg); 
            font-size: 10px; 
            font-weight: bold; 
            letter-spacing: 1.5px; 
            text-transform: uppercase; 
            color: #fbbf24; 
        }

        /* Écran Game Over Classique */
        #game-over-screen { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(9, 13, 26, 0.96); 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            pointer-events: auto; 
            padding: 25px; 
            text-align: center; 
            z-index: 10; 
        }
        .btn { 
            background: #2563eb; 
            color: white; 
            border: none; 
            padding: 14px 28px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.4);
            transition: background 0.2s;
        }
        .btn:active { background: #1d4ed8; }
        .leaderboard { width: 100%; max-width: 320px; margin: 20px 0; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; }
        .leaderboard-row { display: flex; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 15px; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="score-box" class="hud-box">PUISSANCE: <span id="scoreText">0</span> ⚡</div>
            <div id="speed-box" class="hud-box">VITESSE: <span id="speedText">1.0x</span></div>
            <div id="jauge-container"><div id="jauge-fill"></div><div id="jauge-label">Super Jauge</div></div>
        </div>

        <div id="game-over-screen">
            <h1 style="color: #ef4444; margin-bottom: 5px; font-size: 28px; letter-spacing: 1px;">FIN DE TRANSMISSION</h1>
            <p id="final-score-text" style="font-size: 22px; color: #fbbf24; margin-top: 5px; font-weight: bold;">Votre score : 0</p>
            <h3 style="margin-bottom: 10px; letter-spacing: 0.5px;">🏆 TOP 5 DU WEEK-END</h3>
            <div class="leaderboard" id="leaderboard-content">
                <div class="leaderboard-row"><span>Chargement du classement...</span></div>
            </div>
            <button class="btn" onclick="recommencer()">RECOLLER AU DÉCOLLAGE</button>
        </div>
    </div>

<script>
// --- CONFIGURATION CENTRALISÉE DES LIENS GLOBAUX ---
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-14uN1svuWyiSZN3yDsLpXKxaJKCsuRNZAvlvGCAoSjp_7fFjROydAhcinzHJgw3M/exec"; 

// Chargement CDN des images d'origine pour une stabilité absolue sur mobile
const URL_FOND = "https://centredevie.github.io/jeu-fusee/fond.jpg";
const URL_FUSEE = "https://centredevie.github.io/jeu-fusee/fusee.png";
const URL_METEORE = "https://i.ibb.co/kxZt3fL/meteore-voxel.png"; // Image de la météorite voxel de la maquette
const URL_BATTERIE = "https://i.ibb.co/yNfRWhq/batterie-voxel.png"; // Image de la batterie lumineuse de la maquette

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 450;
canvas.height = 800;

// Préparation graphique
const imgFond = new Image(); imgFond.src = URL_FOND;
const imgFusee = new Image(); imgFusee.src = URL_FUSEE;
const imgMeteore = new Image(); imgMeteore.src = URL_METEORE;
const imgBatterie = new Image(); imgBatterie.src = URL_BATTERIE;

let fondPret = false; let fuseePrete = false; let meteorePret = false; let batteriePrete = false;
imgFond.onload = () => fondPret = true;
imgFusee.onload = () => fuseePrete = true;
imgMeteore.onload = () => meteorePret = true;
imgBatterie.onload = () => batteriePrete = true;

// Moteur de jeu
let score = 0; let gameSpeed = 4.2; let gameOver = false; let fondY = 0;
let superJauge = 0; let estInvincible = false;
const rocket = { x: 192, y: 620, width: 66, height: 115, targetX: 192 };
let items = [];
let topScoresLocaux = []; 

// Allumage immédiat
prechargerScores();
spawnItem();
gameLoop();

function prechargerScores() {
    fetch(SCRIPT_URL).then(res => res.json()).then(data => { if(data) topScoresLocaux = data; }).catch(() => {});
}

function spawnItem() {
    if (gameOver) return;
    let ratioObstacle = 0.68 + (gameSpeed * 0.008);
    let typeChoisi = (Math.random() < ratioObstacle) ? "obstacle" : "booster";
    
    items.push({
        x: Math.random() * (canvas.width - 55),
        y: -70,
        width: typeChoisi === "obstacle" ? 52 : 42,
        height: typeChoisi === "obstacle" ? 52 : 55,
        type: typeChoisi
    });
    setTimeout(spawnItem, Math.max(340, 1250 - (gameSpeed * 45)));
}

function update() {
    if (gameOver) return;
    
    // Défilement infini du décor vertical
    fondY += gameSpeed * 0.55; 
    if (fondY >= canvas.height) fondY = 0;
    
    gameSpeed += 0.0022;
    document.getElementById("speedText").innerText = (gameSpeed / 4).toFixed(1) + "x";
    
    // Amorti du déplacement de la fusée
    rocket.x += (rocket.targetX - rocket.x) * 0.18;

    // Logique du Mode Invincible
    if (estInvincible) {
        superJauge -= 0.35;
        if (superJauge <= 0) { 
            superJauge = 0; 
            estInvincible = false; 
            canvas.style.filter = "none"; 
        }
    }
    document.getElementById("jauge-fill").style.height = superJauge + "%";

    for (let i = items.length - 1; i >= 0; i--) {
        items[i].y += gameSpeed;

        // Collision par boîte (AABB)
        if (rocket.x < items[i].x + items[i].width &&
            rocket.x + rocket.width > items[i].x &&
            rocket.y < items[i].y + items[i].height &&
            rocket.y + rocket.height > items[i].y) {
            
            if (items[i].type === "booster") {
                score += 30;
                if (!estInvincible) {
                    superJauge = Math.min(100, superJauge + 20);
                    if (superJauge >= 100) { 
                        estInvincible = true; 
                        canvas.style.filter = "saturate(1.8) contrast(1.1) drop-shadow(0px 0px 12px #fbbf24)"; 
                    }
                }
                items.splice(i, 1);
            } else {
                if (!estInvincible) { 
                    declencherGameOver(); 
                } else { 
                    score += 60; // Éclater un obstacle donne de gros bonus en mode Super !
                    items.splice(i, 1); 
                }
            }
            document.getElementById("scoreText").innerText = score;
            continue;
        }
        
        // Objet sort par le bas
        if (items[i].y > canvas.height) { 
            items.splice(i, 1); 
            score += 2; 
            document.getElementById("scoreText").innerText = score; 
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. Rendu du Fond Minecraft original
    if (fondPret) {
        ctx.drawImage(imgFond, 0, fondY, canvas.width, canvas.height);
        ctx.drawImage(imgFond, 0, fondY - canvas.height, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // 2. Rendu des Obstacles et Boosters
    items.forEach(item => {
        if (item.type === "obstacle") {
            if (meteorePret) {
                ctx.drawImage(imgMeteore, item.x, item.y, item.width, item.height);
            } else {
                ctx.font = "36px Arial"; ctx.fillText("☄️", item.x, item.y);
            }
        } else {
            if (batteriePrete) {
                ctx.drawImage(imgBatterie, item.x, item.y, item.width, item.height);
            } else {
                ctx.font = "36px Arial"; ctx.fillText("🔋", item.x, item.y);
            }
        }
    });

    // 3. Rendu de la Fusée Mascotte originale
    if (fuseePrete) {
        if(estInvincible) { ctx.shadowBlur = 25; ctx.shadowColor = "#fbbf24"; }
        ctx.drawImage(imgFusee, rocket.x, rocket.y, rocket.width, rocket.height);
        ctx.shadowBlur = 0;
    } else {
        ctx.font = "50px Arial"; ctx.fillText("🚀", rocket.x + 5, rocket.y);
    }
}

function gameLoop() { update(); draw(); if (!gameOver) requestAnimationFrame(gameLoop); }

function declencherGameOver() {
    gameOver = true;
    document.getElementById("final-score-text").innerText = "Votre puissance finale : " + score + " ⚡";
    document.getElementById("game-over-screen").style.display = "flex";
    
    let pseudo = prompt("Entrez votre pseudo pour le classement du week-end :");
    if (!pseudo || pseudo.trim() === "") pseudo = "Pilote";

    // Injection visuelle immédiate sans aucune latence
    topScoresLocaux.push({ pseudo: pseudo, score: score });
    topScoresLocaux.sort((a, b) => b.score - a.score);
    afficherLeTableau(pseudo, score);

    // Expédition vers le cloud Google Sheet en arrière-plan
    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pseudo: pseudo, score: score })
    }).then(() => {
        setTimeout(recupererScoresSeuls, 1000);
    }).catch(() => {});
}

function afficherLeTableau(monPseudo, monScore) {
    let html = "";
    if(topScoresLocaux.length === 0) {
        html = '<div class="leaderboard-row"><span>Aucun score enregistré.</span></div>';
    } else {
        topScoresLocaux.slice(0, 5).forEach((joueur, index) => {
            let style = joueur.pseudo === monPseudo && joueur.score === monScore ? 'style="color:#fbbf24; font-weight:bold;"' : '';
            html += `<div class="leaderboard-row" ${style}><span>${index+1}. ${joueur.pseudo}</span><span>${joueur.score} ⚡</span></div>`;
        });
    }
    document.getElementById("leaderboard-content").innerHTML = html;
}

function recupererScoresSeuls() {
    fetch(SCRIPT_URL).then(res => res.json()).then(data => { if(data && data.length > 0) { topScoresLocaux = data; afficherLeTableau("", 0); } }).catch(() => {});
}

function recommencer() { document.location.reload(); }

function piloter(clientX) {
    const rect = canvas.getBoundingClientRect();
    let echelle = canvas.width / rect.width;
    rocket.targetX = Math.max(0, Math.min(canvas.width - rocket.width, ((clientX - rect.left) * echelle) - rocket.width / 2));
}
window.addEventListener("mousemove", (e) => { piloter(e.clientX); });
window.addEventListener("touchmove", (e) => { if(e.touches.length > 0) piloter(e.touches[0].clientX); }, { passive: false });
</script>
</body>
</html>
