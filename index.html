<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Montée en Puissance - Version Finale</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body { background: #090d16; color: white; font-family: 'Segoe UI', Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100%; max-width: 450px; height: 100vh; max-height: 850px; box-shadow: 0 0 40px rgba(0,0,0,0.85); background: #111; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* HUD Style Maquette */
        #ui-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; padding: 15px; z-index: 5; }
        .hud-box { position: absolute; background: rgba(14, 23, 41, 0.85); padding: 10px 14px; border-radius: 6px; border: 2px solid #38bdf8; font-weight: bold; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        #score-box { top: 15px; left: 15px; }
        #speed-box { top: 62px; left: 15px; }
        
        /* Super Jauge */
        #jauge-container { position: absolute; right: 15px; top: 100px; width: 28px; height: 280px; background: rgba(14, 23, 41, 0.85); border: 2px solid #f59e0b; border-radius: 14px; overflow: hidden; display: flex; flex-direction: column-reverse; }
        #jauge-fill { width: 100%; height: 0%; background: linear-gradient(to top, #fbbf24, #f97316, #ef4444); }
        #jauge-label { position: absolute; right: -52px; top: 225px; transform: rotate(-90deg); font-size: 9px; font-weight: bold; letter-spacing: 1.2px; text-transform: uppercase; color: #fbbf24; }

        /* Game Over */
        #game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(8, 12, 24, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; padding: 25px; z-index: 10; }
        .btn { background: #2563eb; color: white; border: none; padding: 14px 28px; font-size: 17px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 20px; }
        .leaderboard { width: 100%; max-width: 320px; margin: 20px 0; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; }
        .leaderboard-row { display: flex; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="score-box" class="hud-box">PUISSANCE: <span id="scoreText">0</span> ⚡</div>
            <div id="speed-box" class="hud-box">VITESSE: <span id="speedText">1.0x</span></div>
            <div id="jauge-container"><div id="jauge-fill"></div><div id="jauge-label">Montée en puissance</div></div>
        </div>

        <div id="game-over-screen">
            <h1 style="color: #ef4444;">FIN DE TRANSMISSION</h1>
            <p id="final-score-text" style="font-size: 20px; color: #fbbf24; font-weight: bold; margin: 10px 0;">Votre score : 0</p>
            <h3>🏆 TOP 5 DU WEEK-END</h3>
            <div class="leaderboard" id="leaderboard-content"></div>
            <button class="btn" onclick="recommencer()">RECOLLER AU DÉCOLLAGE</button>
        </div>
    </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-14uN1svuWyiSZN3yDsLpXKxaJKCsuRNZAvlvGCAoSjp_7fFjROydAhcinzHJgw3M/exec"; 

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 450;
canvas.height = 800;

// =========================================================================
// COMMENT OBTENIR VOS LIENS RAW SUR GITHUB :
// 1. Allez sur GitHub sur votre fichier "fond.jpg".
// 2. Cliquez sur le bouton "Raw" en haut à droite de l'image.
// 3. Copiez l'adresse de la page (elle doit commencer par raw.githubusercontent.com).
// =========================================================================
const URL_FOND = "https://raw.githubusercontent.com/centredevie/jeu-fusee/main/fond.jpg";
const URL_FUSEE = "https://raw.githubusercontent.com/centredevie/jeu-fusee/main/fusee.png";

const imgFond = new Image(); imgFond.src = URL_FOND;
const imgFusee = new Image(); imgFusee.src = URL_FUSEE;

// Éléments graphiques secondaires hébergés de manière stable
const imgMeteore = new Image(); imgMeteore.src = 'https://i.ibb.co/3W4Tz4n/meteore-voxel.png';
const imgBatterie = new Image(); imgBatterie.src = 'https://i.ibb.co/yNfRWhq/batterie-voxel.png';
const imgNuage = new Image(); imgNuage.src = 'https://i.ibb.co/YyY2Z1C/nuage-voxel.png';

let score = 0; let gameSpeed = 4.5; let gameOver = false; let fondY = 0;
let superJauge = 0; let estInvincible = false; let screenShake = 0;

// Proportions élancées parfaites (Silhouette verticale de la fusée respectée)
const rocket = { x: 192, y: 610, width: 66, height: 120, targetX: 192 };
let items = []; let particules = []; let topScoresLocaux = [];

prechargerScores();
spawnItem();
gameLoop();

function prechargerScores() {
    fetch(SCRIPT_URL).then(res => res.json()).then(data => { if(data) topScoresLocaux = data; }).catch(() => {});
}

function spawnItem() {
    if (gameOver) return;
    let rand = Math.random();
    let type = rand > 0.75 ? "booster" : (rand > 0.5 ? "nuage" : "obstacle");
    let size = type === "nuage" ? 110 : (type === "obstacle" ? 55 : 44);

    items.push({
        x: Math.random() * (canvas.width - size - 20) + 10,
        y: -120,
        width: size,
        height: type === "nuage" ? 55 : (type === "obstacle" ? 55 : 48),
        type: type
    });
    setTimeout(spawnItem, Math.max(300, 1200 - (gameSpeed * 45)));
}

function ajouterParticule(x, y, couleur, taille, vy) {
    particules.push({ x: x, y: y, vx: (Math.random() - 0.5) * 2, vy: vy, alpha: 1, taille: taille, couleur: couleur });
}

function update() {
    if (gameOver) return;

    fondY += gameSpeed * 0.55; 
    if (fondY >= canvas.height) fondY = 0;
    
    gameSpeed += 0.0022;
    document.getElementById("speedText").innerText = (gameSpeed / 4).toFixed(1) + "x";
    
    // SÉCURITÉ ANTI-TRICHE : Empêche strictement la fusée de sortir des bords visibles
    rocket.x += (rocket.targetX - rocket.x) * 0.22;
    if (rocket.x < 15) rocket.x = 15;
    if (rocket.x > canvas.width - rocket.width - 15) rocket.x = canvas.width - rocket.width - 15;

    if (screenShake > 0) screenShake -= 0.1;

    // Flammes rétro-propulsées
    if (Math.random() < 0.6) {
        ajouterParticule(rocket.x + rocket.width / 2, rocket.y + rocket.height - 10, '#f59e0b', Math.random() * 5 + 3, Math.random() * 3 + 4);
    }

    if (estInvincible) {
        superJauge -= 0.4;
        if (superJauge <= 0) estInvincible = false;
    }
    document.getElementById("jauge-fill").style.height = superJauge + "%";

    for (let p = particules.length - 1; p >= 0; p--) {
        particules[p].x += particules[p].vx; particules[p].y += particules[p].vy; particules[p].alpha -= 0.02;
        if (particules[p].alpha <= 0) particules.splice(p, 1);
    }

    for (let i = items.length - 1; i >= 0; i--) {
        let it = items[i];
        it.y += it.type === "nuage" ? gameSpeed * 0.75 : gameSpeed;

        if (it.type === "nuage") {
            if (it.y > canvas.height) items.splice(i, 1);
            continue;
        }

        // Zone de détection de collision solide
        if (rocket.x + 8 < it.x + it.width && rocket.x + rocket.width - 8 > it.x &&
            rocket.y + 10 < it.y + it.height && rocket.y + rocket.height - 15 > it.y) {
            
            if (it.type === "booster") {
                score += 30;
                if (!estInvincible) {
                    superJauge = Math.min(100, superJauge + 20);
                    if (superJauge >= 100) { estInvincible = true; screenShake = 3; }
                }
                items.splice(i, 1);
            } else {
                if (!estInvincible) { declencherGameOver(); } 
                else { score += 60; items.splice(i, 1); }
            }
            document.getElementById("scoreText").innerText = score;
            continue;
        }

        if (it.y > canvas.height) { items.splice(i, 1); score += 2; document.getElementById("scoreText").innerText = score; }
    }
}

function draw() {
    ctx.save();
    if (screenShake > 0) ctx.translate((Math.random() - 0.5) * screenShake * 4, (Math.random() - 0.5) * screenShake * 4);

    // Rendu du fond d'écran
    ctx.drawImage(imgFond, 0, fondY, canvas.width, canvas.height);
    ctx.drawImage(imgFond, 0, fondY - canvas.height, canvas.width, canvas.height);

    particules.forEach(p => {
        ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.couleur;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.taille, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    });

    items.forEach(it => {
        if (it.type === "obstacle") ctx.drawImage(imgMeteore, it.x, it.y, it.width, it.height);
        else if (it.type === "booster") ctx.drawImage(imgBatterie, it.x, it.y, it.width, it.height);
        else if (it.type === "nuage") { ctx.save(); ctx.globalAlpha = 0.85; ctx.drawImage(imgNuage, it.x, it.y, it.width, it.height); ctx.restore(); }
    });

    // Rendu de la fusée mascotte
    if (estInvincible) { ctx.save(); ctx.shadowBlur = 25; ctx.shadowColor = "#fbbf24"; }
    ctx.drawImage(imgFusee, rocket.x, rocket.y, rocket.width, rocket.height);
    if (estInvincible) ctx.restore();

    ctx.restore();
}

function gameLoop() { update(); draw(); if (!gameOver) requestAnimationFrame(gameLoop); }

function declencherGameOver() {
    gameOver = true;
    document.getElementById("final-score-text").innerText = "Votre puissance finale : " + score + " ⚡";
    document.getElementById("game-over-screen").style.display = "flex";
    let pseudo = prompt("Votre pseudo :");
    if (!pseudo) pseudo = "Pilote";
    topScoresLocaux.push({ pseudo: pseudo, score: score });
    topScoresLocaux.sort((a, b) => b.score - a.score);
    let html = "";
    topScoresLocaux.slice(0, 5).forEach((j, index) => { html += `<div class="leaderboard-row"><span>${index+1}. ${j.pseudo}</span><span>${j.score} ⚡</span></div>`; });
    document.getElementById("leaderboard-content").innerHTML = html;
}

function recommencer() { document.location.reload(); }

function piloter(clientX) {
    const rect = canvas.getBoundingClientRect();
    let echelle = canvas.width / rect.width;
    let bruteTarget = ((clientX - rect.left) * echelle) - rocket.width / 2;
    rocket.targetX = Math.max(10, Math.min(canvas.width - rocket.width - 10, bruteTarget));
}
window.addEventListener("mousemove", (e) => { piloter(e.clientX); });
window.addEventListener("touchmove", (e) => { if(e.touches.length > 0) piloter(e.touches[0].clientX); }, { passive: false });
</script>
</body>
</html>
